async function submitAddItem(){
  const type = state.manageAddType;
  const category = val('f_category');
  const name = val('f_name');
  if(!name){ showToast("Name is required"); return; }
  const id = nextItemId();
  let saveResult = {ok:true};
  if(type === "consumable"){
    const item = {
      id, type:"consumable", category:"Consumables", name,
      currentStock:Number(val('f_current'))||0, minStock:Number(val('f_min'))||0, maxStock:Number(val('f_max'))||0,
      batchNumber:val('f_batch')||"—", expiryDate:parseDate(val('f_expiry'))||new Date(today.getFullYear()+1,today.getMonth(),today.getDate()),
      supplier:val('f_supplier')||"—", storeLocation:val('f_storeloc')||"NICU Store", usageFlag:null,
      boxCount:Number(val('f_boxcount'))||0, unitsPerBox:Number(val('f_unitsperbox'))||0, totalIssued:0,
      unit: val('f_unit') || defaultUnitForCategory(category) || null,
    };
    items.push(item);
    saveResult = await postAction("addConsumable", {
      id, category:item.category, name, currentStock:item.currentStock, minStock:item.minStock, maxStock:item.maxStock,
      batchNumber:item.batchNumber, expiryDate: val('f_expiry') || todayStr(), supplier:item.supplier, storeLocation:item.storeLocation,
      boxCount:item.boxCount, unitsPerBox:item.unitsPerBox, totalIssued:item.totalIssued, unit:item.unit||"",
    });
  } else {
    const item = {
      id, type, category, name,
      assetNumber:"AST-"+id.slice(-4), hospitalAssetId:val('f_hospid')||("H-"+id.slice(-4)), hospitalFileRef:val('f_hospfileref')||"—", serialNumber:val('f_serial')||"—",
      manufacturer:val('f_manufacturer')||"—", model:val('f_model')||"—",
      warranty:new Date(today.getFullYear()+2,today.getMonth(),today.getDate()), purchaseDate:today,
      location:val('f_location')||"NICU Store", status:"Working",
      lastPM:today, nextPM:new Date(today.getFullYear()+1,today.getMonth(),today.getDate()),
      supplier: val('f_supplier')||"—", biomedicalContact: val('f_biocontact')||"—", photo: state.newAssetPhoto || null,
    };
    if(type === "equipment") item.assignedPatient = null;
    if(type === "nonconsumable"){
      item.boxCount = Number(val('f_boxcount'))||0;
      item.unitsPerBox = Number(val('f_unitsperbox'))||0;
      const total = item.boxCount * item.unitsPerBox;
      item.qtyClean = total; item.qtyDirty = 0; item.qtyReprocessing = 0;
    }
    item.unit = val('f_unit') || defaultUnitForCategory(category) || null;
    items.push(item);
    saveResult = await postAction("addEquipment", {
      id, type, category, name, assetNumber:item.assetNumber, hospitalAssetId:item.hospitalAssetId, hospitalFileRef:item.hospitalFileRef, serialNumber:item.serialNumber,
      manufacturer:item.manufacturer, model:item.model, warranty:todayStr(item.warranty), purchaseDate:todayStr(item.purchaseDate),
      location:item.location, status:item.status, lastPM:todayStr(item.lastPM), nextPM:todayStr(item.nextPM),
      supplier:item.supplier, biomedicalContact:item.biomedicalContact,
      assignedPatient: item.assignedPatient || "",
      boxCount: item.boxCount||"", unitsPerBox: item.unitsPerBox||"", qtyClean: item.qtyClean||"", qtyDirty: item.qtyDirty||"", qtyReprocessing: item.qtyReprocessing||"",
      unit: item.unit || "",
    });
    state.prefillCode = null;
  }
  logHistory(id, "Added", "Registered new item");
  state.newAssetPhoto = null;
  state.addDraft = null;
  state.manageTab = "add";
  state.modal = "justAdded";
  state.justAddedId = id;
  // Track whether the item actually made it into the Sheet, so the
  // "just added" confirmation screen can tell the person the truth instead
  // of implying success just because it's visible in this session's list.
  state.justAddedSynced = !!saveResult.ok;
  if(!saveResult.ok){
    showToast("⚠ "+name+" was added on this device but NOT saved to the Google Sheet yet");
  }
  render();
}

function submitRemoveItem(){
  const id = val('removeSelect') || document.getElementById('removeSelect').value;
  const it = getItem(id);
  if(!it) return;
  if(!confirm(`Remove ${it.name} (${id}) from the registry? This cannot be undone.`)) return;
  logHistory(id, "Removed", "Removed from asset registry");
  postAction("deleteItem", {id, sheet: it.type==="consumable" ? "Consumables" : "Equipment"});
  items = items.filter(i=>i.id!==id);
  showToast(it.name + " removed");
  render();
}

function todayStr(d){
  d = d || today;
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function dateInputVal(d){
  if(!d) return "";
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function renderPrintQrs(){
  document.querySelectorAll('[id^="pqr_"]').forEach(holder=>{
    const id = holder.id.replace('pqr_','');
    holder.innerHTML = "";
    try{
      if(typeof QRCode === "undefined") throw new Error("QRCode library not loaded");
      new QRCode(holder, { text: qrPayloadFor(id), width: 72, height: 72, correctLevel: QRCode.CorrectLevel.M });
    }catch(e){
      holder.innerHTML = `<div style="font-size:9px; color:var(--muted);">${id}</div>`;
    }
  });
}

/* ---------------- BLUETOOTH LABEL PRINTING (Web Bluetooth, on-device raster) ---------------- */
/* Covers the common BLE "serial passthrough" chipsets used by cheap thermal/label printers.
   Exact service depends on the printer model, so we probe a short list of known profiles. */
const BT_PRINTER_PROFILES = [
  { service: '000018f0-0000-1000-8000-00805f9b34fb', write: '00002af1-0000-1000-8000-00805f9b34fb' }, // common BLE thermal/label printers
  { service: '49535343-fe7d-4ae5-8fa9-9fafd205e455', write: '49535343-8841-43f4-a8d4-ecbe34729bb3' }, // Microchip transparent UART
  { service: '0000ffe0-0000-1000-8000-00805f9b34fb', write: '0000ffe1-0000-1000-8000-00805f9b34fb' }, // HM-10 / CC41 serial modules
];

function buildLabelCanvas(id, name){
  const size = 300;
  return new Promise(resolve=>{
    const tmp = document.createElement('div');
    new QRCode(tmp, { text: qrPayloadFor(id), width: size, height: size, correctLevel: QRCode.CorrectLevel.M });
    function draw(imgEl){
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size + 60;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(imgEl, 0, 0, size, size);
      ctx.fillStyle = '#000'; ctx.textAlign = 'center';
      ctx.font = '16px sans-serif'; ctx.fillText(String(name).slice(0,28), size/2, size+22);
      ctx.font = '13px sans-serif'; ctx.fillText(id, size/2, size+44);
      resolve(canvas);
    }
    const qrCanvas = tmp.querySelector('canvas');
    const qrImg = tmp.querySelector('img');
    if(qrCanvas) draw(qrCanvas);
    else if(qrImg){ qrImg.complete ? draw(qrImg) : (qrImg.onload = ()=>draw(qrImg)); }
  });
}
function canvasToEscposRaster(canvas){
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const bytesPerRow = Math.ceil(w/8);
  const data = ctx.getImageData(0,0,w,h).data;
  const raster = new Uint8Array(bytesPerRow*h);
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const idx = (y*w+x)*4;
      const lum = 0.299*data[idx] + 0.587*data[idx+1] + 0.114*data[idx+2];
      if(lum < 160) raster[y*bytesPerRow + (x>>3)] |= (0x80 >> (x & 7));
    }
  }
  const xL = bytesPerRow & 0xFF, xH = (bytesPerRow >> 8) & 0xFF;
  const yL = h & 0xFF, yH = (h >> 8) & 0xFF;
  const init = Uint8Array.of(0x1B, 0x40);
  const header = Uint8Array.of(0x1D, 0x76, 0x30, 0x00, xL, xH, yL, yH);
  const feed = Uint8Array.of(0x0A, 0x0A, 0x0A);
  const out = new Uint8Array(init.length + header.length + raster.length + feed.length);
  out.set(init, 0); out.set(header, init.length);
  out.set(raster, init.length + header.length);
  out.set(feed, init.length + header.length + raster.length);
  return out;
}
async function connectBluetoothPrinter(){
  if(!navigator.bluetooth) throw new Error("Web Bluetooth isn't supported in this browser");
  const device = await navigator.bluetooth.requestDevice({
    acceptAllDevices: true,
    optionalServices: BT_PRINTER_PROFILES.map(p=>p.service),
  });
  const server = await device.gatt.connect();
  for(const profile of BT_PRINTER_PROFILES){
    try{
      const service = await server.getPrimaryService(profile.service);
      const characteristic = await service.getCharacteristic(profile.write);
      return characteristic;
    }catch(e){ /* not this profile — try next */ }
  }
  throw new Error("Connected, but this printer's service wasn't recognized");
}
async function writeInChunks(characteristic, bytes){
  const chunkSize = 180;
  for(let i=0;i<bytes.length;i+=chunkSize){
    await characteristic.writeValue(bytes.slice(i, i+chunkSize));
    await new Promise(r=>setTimeout(r, 20));
  }
}
async function printLabelViaBluetooth(id, name){
  if(!navigator.bluetooth){ showToast("This browser/device doesn't support Bluetooth printing — try Print via Browser"); return; }
  showToast("Pick your label printer…");
  try{
    const canvas = await buildLabelCanvas(id, name);
    const characteristic = await connectBluetoothPrinter();
    showToast("Printing…");
    await writeInChunks(characteristic, canvasToEscposRaster(canvas));
    showToast("Sent to printer");
  }catch(err){
    showToast("Bluetooth print failed: " + (err && err.message ? err.message : err));
  }
}
async function printListViaBluetooth(list){
  if(!navigator.bluetooth){ showToast("This browser/device doesn't support Bluetooth printing — try Print via Browser"); return; }
  if(!list.length){ showToast("Nothing to print"); return; }
  showToast("Pick your label printer…");
  try{
    const characteristic = await connectBluetoothPrinter();
    for(const it of list){
      showToast("Printing " + it.id + "…");
      const canvas = await buildLabelCanvas(it.id, it.name);
      await writeInChunks(characteristic, canvasToEscposRaster(canvas));
    }
    showToast("Sent " + list.length + " label(s) to printer");
  }catch(err){
    showToast("Bluetooth print failed: " + (err && err.message ? err.message : err));
  }
}
function printSheetViaBluetooth(){
  const q = state.invSearch || "";
  let list = trackable().filter(i=>!q || i.name.toLowerCase().includes(q.toLowerCase()) || i.id.toLowerCase().includes(q.toLowerCase()));
  if(list.length === 0) list = trackable();

/* ---------------- CLOUD SYNC (Google Sheet via Apps Script) ---------------- */
function parseDate(s){
  if(!s) return null;
  const str = String(s);
  const m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return null;
  return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
}

function mapCloudData(json){
  const eq = (json.equipment||[]).map(e=>({
    id:e.ID, type:e.Type, category:e.Category, name:e.Name,
    assetNumber:e.AssetNumber, hospitalAssetId:e.HospitalAssetId, hospitalFileRef:e.HospitalFileRef, serialNumber:e.SerialNumber,
    manufacturer:e.Manufacturer, model:e.Model,
    warranty:parseDate(e.Warranty), purchaseDate:parseDate(e.PurchaseDate),
    location:e.Location, status:e.Status,
    lastPM:parseDate(e.LastPM), nextPM:parseDate(e.NextPM),
    supplier:e.Supplier, biomedicalContact:e.BiomedicalContact,
    assignedPatient: e.Type==="equipment" ? (e.AssignedPatient || null) : undefined,
    boxCount: e.Type==="nonconsumable" ? (Number(e.BoxCount)||0) : undefined,
    unitsPerBox: e.Type==="nonconsumable" ? (Number(e.UnitsPerBox)||0) : undefined,
    qtyClean: e.Type==="nonconsumable" ? (Number(e.QtyClean)||0) : undefined,
    qtyDirty: e.Type==="nonconsumable" ? (Number(e.QtyDirty)||0) : undefined,
    qtyReprocessing: e.Type==="nonconsumable" ? (Number(e.QtyReprocessing)||0) : undefined,
    unit: e.Unit || e.Ward || null, // falls back to a legacy Ward column if the sheet hasn't been migrated yet
  }));
  const cons = (json.consumables||[]).map(c=>({
    id:c.ID, type:"consumable", category:c.Category, name:c.Name,
    currentStock:Number(c.CurrentStock)||0, minStock:Number(c.MinStock)||0, maxStock:Number(c.MaxStock)||0,
    batchNumber:c.BatchNumber, expiryDate:parseDate(c.ExpiryDate), supplier:c.Supplier,
    storeLocation:c.StoreLocation, usageFlag: c.UsageFlag || null,
    boxCount: Number(c.BoxCount)||0, unitsPerBox: Number(c.UnitsPerBox)||0, totalIssued: Number(c.TotalIssued)||0,
    unit: c.Unit || null,
  }));
  items = [...eq, ...cons];
  history = (json.history||[]).map(h=>({
    itemId:h.ItemId, action:h.Action, who:h.Who, date:parseDate(h.Date)||today, time:h.Time, location:h.Location, reason:h.Reason,
  }));
  repairs = (json.repairs||[]).map(r=>({
    itemId:r.ItemId, fault:r.Fault, reported:parseDate(r.Reported)||today, engineer:r.Engineer, completed:parseDate(r.Completed),
  }));
  movements = (json.movements||[]).map(m=>({
    itemId:m.ItemId, from:m.From, via:m.Via||null, to:m.To, date:parseDate(m.Date)||today,
  }));
  auditState = {};
  // Categories are shared team-wide once connected — the sheet is the source of truth,
  // overriding whatever was cached locally. Falls back to the local/default list for any
  // type the backend doesn't return, so older backends without category support still work.
  if(json.categories && typeof json.categories === "object"){
    for(const type of Object.keys(CATEGORY_OPTIONS)){
      if(Array.isArray(json.categories[type]) && json.categories[type].length){
        CATEGORY_OPTIONS[type] = json.categories[type];
      }
    }
    saveCategoryOptions();
  }
  if(Array.isArray(json.locations) && json.locations.length){
    // Union, not overwrite — if the connected Sheet's Locations tab hasn't been seeded with
    // the full ward layout yet, a sync must never silently erase wards that only exist locally.
    // Anything the sheet knows about that isn't already in the ward baseline is treated as custom.
    json.locations.forEach(l=>{ if(!DELETED_LOCATIONS.includes(l) && !CUSTOM_LOCATIONS.includes(l)) CUSTOM_LOCATIONS.push(l); });
    saveLocations();
  }
}

async function syncFromCloud(){
  if(!state.apiUrl) return;
  state.syncStatus = "connecting"; render();
  try{
    const sep = state.apiUrl.includes("?") ? "&" : "?";
    const res = await fetch(state.apiUrl + sep + "action=getAll");
    if(!res.ok) throw new Error("HTTP "+res.status);
    const json = await res.json();
    if(json.error) throw new Error(json.error);
    mapCloudData(json);
    state.syncStatus = "connected";
    state.syncError = "";
    showToast("Synced with Google Sheet");
  }catch(err){
    state.syncStatus = "error";
    state.syncError = String(err.message||err);
  }
  render();
}

async function postAction(action, payload){
  // IMPORTANT: this used to bail out silently (no toast, no error) whenever
  // state.syncStatus wasn't exactly "connected" -- e.g. right after the app
  // loads and the initial getAll sync hasn't resolved yet, or after a sync
  // error banner was showing. That made "Register new item" look like it
  // worked (it's added to the local `items` array either way) while nothing
  // was ever sent to the Sheet, and nothing told the person that happened.
  // Now we always attempt the write whenever a Sheet URL is configured, and
  // we always surface success/failure so a failed save is never silent.
  if(!state.apiUrl){
    showToast("No Google Sheet connected — item saved on this device only");
    return {ok:false, offline:true};
  }
  try{
    const res = await fetch(state.apiUrl, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({action, payload}),
    });
    const json = await res.json();
    if(!json.ok){
      showToast("Sheet sync warning: "+(json.error||"unknown error"));
      return {ok:false, error:json.error||"unknown error"};
    }
    // A successful write proves the connection is actually good, so heal the
    // banner if it was stuck showing "connecting" or "error" from earlier.
    if(state.syncStatus!=="connected"){ state.syncStatus="connected"; state.syncError=""; render(); }
    return {ok:true, json};
  }catch(err){
    showToast("⚠ Not saved to Google Sheet — check your connection and retry");
    return {ok:false, offline:true, error:String(err.message||err)};
  }
}

/* ---------------- MAP (floor map) ---------------- */
function locationMissingCount(loc){
  const results = auditState[loc] || {};
  return Object.values(results).filter(v=>v==='missing').length;
}
/* ---- Ward grouping: "Ward Name - Bed N" locations group under their ward; anything
   without that " - " separator falls back to the old bed/room heuristic (covers legacy
   locations from before wards existed). ---- */
function wardOf(loc){
  const idx = loc.indexOf(" - ");
  if(idx !== -1) return loc.slice(0, idx);
  return /bed\s*\d+/i.test(loc) ? "Other Beds" : "Rooms & Stores";
}
function wardIcon(ward){
  return {"Intensive NICU":"🔴","Semi-Intensive NICU":"🟠","Convalescent Unit":"🟢","Rooming-In Cubicle":"🏠","Other Beds":"🛏️","Rooms & Stores":"🏬"}[ward] || "📍";
}
function locationSortKey(loc){
  const shortLabel = loc.includes(" - ") ? loc.slice(loc.indexOf(" - ")+3) : loc;
  const m = shortLabel.match(/^bed\s*(\d+)/i);
  return m ? parseInt(m[1],10) : Infinity; // non-bed entries (e.g. isolation rooms) sort after all numbered beds
}
function groupLocationsByWard(allLocs){
  const wardOrder = NICU_WARDS.map(w=>w.name);
  const groups = new Map();
  allLocs.forEach(loc=>{
    const w = wardOf(loc);
    if(!groups.has(w)) groups.set(w, []);
    groups.get(w).push(loc);
  });
  groups.forEach(locs=>{
    locs.sort((a,b)=>{
      const ka = locationSortKey(a), kb = locationSortKey(b);
      if(ka!==kb) return ka-kb;
      return a.localeCompare(b);
    });
  });
  const entries = [...groups.entries()];
  entries.sort((a,b)=>{
    const ia = wardOrder.indexOf(a[0]), ib = wardOrder.indexOf(b[0]);
    if(ia!==-1 && ib!==-1) return ia-ib;
    if(ia!==-1) return -1;
    if(ib!==-1) return 1;
    return a[0].localeCompare(b[0]);
  });
  return entries;
}
function mapTileHtml(loc){
  const here = trackable().filter(i=>i.location===loc);
  const repairCount = here.filter(i=>i.status==='Repair').length;
  const missingCount = locationMissingCount(loc);
  const dotColor = repairCount>0 ? 'var(--red)' : missingCount>0 ? 'var(--amber)' : 'var(--green)';
  const cardClass = repairCount>0 ? 'has-repair' : missingCount>0 ? 'has-missing' : '';
  const icons = [...new Set(here.map(i=>i.category))].slice(0,5).map(c=>`<span title="${c}">${categoryIcon(c)}</span>`).join('');
  const w = wardOf(loc);
  const shortLabel = loc.startsWith(w+" - ") ? loc.slice(w.length+3) : loc;
  return `<div class="map-card ${cardClass}" onclick="state.mapLocation='${loc}'; render();">
    <div class="map-dot" style="background:${dotColor};"></div>
    <div class="map-loc">${shortLabel}</div>
    <div class="map-count">${here.length} item${here.length===1?'':'s'}${repairCount?` · ${repairCount} in repair`:''}</div>
    ${icons ? `<div class="map-icons">${icons}</div>` : ''}
    ${missingCount>0 ? `<div class="map-missing-badge">⚠ ${missingCount} Missing</div>` : ''}
    ${PERMS[state.role].manage ? `
      <div style="display:flex; gap:4px; margin-top:8px;">
        <button class="btn btn-outline" style="width:auto; padding:3px 7px; font-size:10px;" onclick="event.stopPropagation(); openLocationModal('${loc}')">✎ Rename</button>
        <button class="btn btn-outline" style="width:auto; padding:3px 7px; font-size:10px;" onclick="event.stopPropagation(); deleteLocation('${loc}')">🗑</button>
      </div>
    ` : ''}
  </div>`;
}
function wardCardHtml(ward, locs){
  const allHere = locs.flatMap(loc=>trackable().filter(i=>i.location===loc));
  const repairCount = allHere.filter(i=>i.status==='Repair').length;
  const missingCount = locs.reduce((sum,loc)=>sum+locationMissingCount(loc),0);
  const dotColor = repairCount>0 ? 'var(--red)' : missingCount>0 ? 'var(--amber)' : 'var(--green)';
  return `<div class="module-card" onclick="state.mapWard='${ward}'; render();">
    <div class="mic">${wardIcon(ward)}</div>
    <div class="mtxt">
      <div class="mname">${ward}</div>
      <div class="mdesc">${locs.length} bed${locs.length===1?'':'s'}/room${locs.length===1?'':'s'} · ${allHere.length} item${allHere.length===1?'':'s'}${repairCount?` · ${repairCount} in repair`:''}${missingCount>0?` · ⚠ ${missingCount} missing`:''}</div>
    </div>
    <div class="map-dot" style="position:static; flex-shrink:0; background:${dotColor};"></div>
  </div>`;
}
function renderMap(){
  // Level 1: pick a ward
  if(!state.mapWard && !state.mapLocation){
    const allLocs = locations();
    const wardGroups = groupLocationsByWard(allLocs);
    return `
      <h2 class="section-title">🗺️ NICU Floor Map</h2>
      <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
        <div style="font-size:11.5px; color:var(--muted);">Pick a ward, then a bed or room.</div>
        ${PERMS[state.role].manage ? `<button class="btn btn-outline" style="width:auto; padding:6px 10px; font-size:11.5px;" onclick="openLocationModal()">+ Add Location</button>` : ''}
      </div>
      <div class="module-grid">
        ${wardGroups.length ? wardGroups.map(([ward, locs])=>wardCardHtml(ward, locs)).join('') : `<div class="card empty">No locations yet.</div>`}
      </div>
    `;
  }
  // Level 2: this ward's individual beds/rooms
  if(state.mapWard && !state.mapLocation){
    const ward = state.mapWard;
    const locs = locations().filter(l=>wardOf(l)===ward)
      .sort((a,b)=>{
        const ka = locationSortKey(a), kb = locationSortKey(b);
        if(ka!==kb) return ka-kb;
        return a.localeCompare(b);
      });
    return `
      <button class="back-btn" onclick="state.mapWard=null; render();">‹ Map</button>
      <h2 class="section-title">${wardIcon(ward)} ${ward}</h2>
      <div class="map-grid">${locs.map(mapTileHtml).join('') || `<div class="card empty">No beds/rooms in this ward yet.</div>`}</div>
    `;
  }
  // Level 3: everything currently at a specific bed/room
  const loc = state.mapLocation;
  const here = trackable().filter(i=>i.location===loc);
  return `
    <button class="back-btn" onclick="state.mapLocation=null; render();">‹ ${state.mapWard || 'Map'}</button>
    <h2 class="section-title">📍 ${loc}</h2>
    <div class="card">
      ${here.map(i=>`
        <div class="list-item" onclick="openItem('${i.id}')">
          <div><div class="name">${categoryIcon(i.category)} ${i.name}</div><div class="meta">${i.category}</div></div>

/* ---------------- VOICE INPUT (Web Speech API, no external AI needed) ---------------- */
function startVoiceRecognition(onResult){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToast("Voice input isn't supported in this browser"); return; }
  const rec = new SR();
  rec.lang = "en-US"; rec.interimResults = false; rec.maxAlternatives = 1;
  state.voiceListening = true; render();
  rec.onresult = function(e){ const text = e.results[0][0].transcript; state.voiceListening=false; onResult(text); };
  rec.onerror = function(){ state.voiceListening=false; showToast("Didn't catch that — try again"); render(); };
  rec.onend = function(){ state.voiceListening=false; };
  try{ rec.start(); }catch(e){ state.voiceListening=false; }
}
const NUM_WORDS = {one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10};
function parseVoiceIssue(text){
  if(!text) return null;
  const m = String(text).toLowerCase().match(/(\d+|one|two|three|four|five|six|seven|eight|nine|ten)\s+(?:of\s+)?(?:the\s+)?([a-z0-9\s]+?)(?:\s+kits?|\s+units?|\s+packs?|\s+items?)?$/i);
  if(!m) return null;
  const qtyRaw = m[1];
  const qty = NUM_WORDS[qtyRaw] || parseInt(qtyRaw,10);
  let item = m[2].trim().replace(/^(issued|issue|received|receive)\s+/,'');
  if(!qty || !item) return null;
  return {qty, item};
}

/* ---------------- AI ASSISTANT (Apps Script relay, with local fallback) ---------------- */
function localAIAnswer(q){
  const s = q.toLowerCase();
  const whereMatch = s.match(/where\s+is\s+(.+?)\??$/);
  if(whereMatch){
    const term = whereMatch[1].trim();
    const it = items.find(function(i){ return (i.name||'').toLowerCase().includes(term) || (i.id||'').toLowerCase()===term; });
    return it ? `${it.name} is currently at ${it.location||it.storeLocation}.` : `I couldn't find an item matching "${term}".`;
  }
  if(/calibrat/.test(s)){
    const due = calibrationDue(30);
    return due.length ? `${due.length} item(s) due/overdue for calibration within 30 days: ${due.map(function(i){return i.name;}).join(', ')}.` : "Nothing is due for calibration in the next 30 days.";
  }
  if(/low stock|running low|reorder/.test(s)){
    const low = lowStockItems();
    return low.length ? `${low.length} consumable(s) below minimum stock: ${low.map(function(c){return c.name;}).join(', ')}.` : "All consumables are above their minimum stock levels.";
  }
  if(/repair|broken|fault|awaiting/.test(s)){
    const rep = pendingRepairItems();
    return rep.length ? `${rep.length} item(s) currently under repair: ${rep.map(function(i){return i.name;}).join(', ')}.` : "No equipment is currently under repair.";
  }
  if(/how many/.test(s)){
    const term = s.replace(/how many|are|is|currently|in use|working|available|currently|\?/g,'').trim();
    if(term){
      const matches = trackable().filter(function(i){
        return (i.model||'').toLowerCase().includes(term) || (i.name||'').toLowerCase().includes(term) || (i.category||'').toLowerCase().includes(term);
      });
      const inUse = matches.filter(function(i){ return i.status==='Working'; }).length;
      return matches.length ? `${matches.length} item(s) matching "${term}" registered — ${inUse} currently marked Working.` : `I couldn't find any equipment matching "${term}".`;
    }
  }
  return "I can answer questions about counts, locations, calibration, low stock, and repairs from the current inventory data (e.g. \"Where is syringe pump 18?\"). Connect a Google Sheet with an AI key configured (see setup guide) for fuller natural-language answers.";
}
async function askAI(question){
  state.aiMessages.push({role:'user', text:question});
  state.aiBusy = true; render();
  let answer;
  if(state.apiUrl && state.syncStatus === 'connected'){
    try{
      const res = await fetch(state.apiUrl, {
        method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({action:"aiQuery", payload:{question:question, who: state.role}}),
      });
      const json = await res.json();
      if(json.ok && json.answer) answer = json.answer;
      else answer = localAIAnswer(question);
    }catch(err){
      answer = localAIAnswer(question);
    }
  } else {
    answer = localAIAnswer(question);
  }
  state.aiMessages.push({role:'ai', text:answer});
  state.aiBusy = false;
  render();
}

/* ---------------- EQUIPMENT TIMELINE ---------------- */
function buildTimeline(it){
  const events = [];
  const iconMap = {"Serviced / Calibrated":"🔧","Moved":"📦","Fault reported":"⚠️","Repair completed":"✅","Audited":"🔍","Scanned":"📷","Used":"💉","Reprocessed":"♻️","Replaced":"🔁","Edited":"✎","Added":"＋","Crash Trolley Check":"🧰"};
  const loc = it.location || it.storeLocation || "";
  if(it.purchaseDate){
    events.push({t: it.purchaseDate, label: "Purchased", icon:"🛒"});
    events.push({t: it.purchaseDate, label: "Installed at " + loc, icon:"📍"});
  }
  history.filter(function(h){ return h.itemId===it.id; }).slice().reverse().forEach(function(h){
    events.push({t:h.date || today, label: h.action + (h.reason?': '+h.reason:''), icon: iconMap[h.action] || "•"});
  });
  const statusLabel = it.type==='consumable' ? (it.currentStock + " in stock") : it.status;
  events.push({t: today, label: "Current: " + statusLabel + " at " + loc, icon:"🏥", current:true});
  return events.sort(function(a,b){ return a.t-b.t; });
}
function openTimeline(id){ state.modal="timeline"; state.timelineId=id; render(); }
function closeTimeline(){ state.modal=null; render(); }
function renderTimelineModal(){
  const it = getItem(state.timelineId);
  if(!it) return "";
  const events = buildTimeline(it);
  return `
    <div class="modal-overlay" onclick="if(event.target===this) closeTimeline()">
      <div class="modal">
        <h3>🕒 Timeline — ${it.name}</h3>
        <div class="timeline">
          ${events.map(function(e){
            return `<div class="timeline-item ${e.current?'current':''}">
              <div class="tl-dot">${e.icon}</div>
              <div class="tl-body"><div class="tl-label">${e.label}</div><div class="tl-date">${fmt(e.t)}</div></div>
            </div>`;
          }).join('')}
        </div>
        <button class="btn btn-secondary" style="margin-top:8px;" onclick="closeTimeline()">Close</button>
      </div>
    </div>
  `;
}

/* ---------------- ANALYTICS ---------------- */
function weeklyIssuedTrend(weeks){
  const buckets = [];
  for(let w=weeks-1; w>=0; w--){
    const start = new Date(today); start.setDate(start.getDate() - (w+1)*7);
    const end = new Date(today); end.setDate(end.getDate() - w*7);
    const count = history.filter(h=>h.action==="Issued" && h.date>=start && h.date<end).length;
    buckets.push({label:`${end.getDate()}/${end.getMonth()+1}`, value:count, color:"var(--blue)"});
  }
  return buckets;
}
function stockPredictionList(){
  return consumables().map(c=>{
    const last30 = history.filter(h=>h.itemId===c.id && h.action==="Issued" && daysBetween(h.date,today)<=30).length;
    const avgDaily = last30/30;
    const daysRemaining = avgDaily>0 ? Math.round(c.currentStock/avgDaily) : null;
    return {...c, avgDaily, daysRemaining};
  }).filter(c=>c.daysRemaining!==null).sort((a,b)=>a.daysRemaining-b.daysRemaining).slice(0,6);
}
function renderAnalytics(){
  const track = trackable();
  const totalTrack = track.length || 1;
  const util = Math.round((track.filter(function(i){ return i.status==='Working'; }).length/totalTrack)*100);
  const downtimeItems = track.filter(function(i){ return i.status==='Repair'; });
  const repairCounts = {};
  repairs.forEach(function(r){ repairCounts[r.itemId] = (repairCounts[r.itemId]||0)+1; });
  const mostRepaired = Object.entries(repairCounts).sort(function(a,b){ return b[1]-a[1]; }).slice(0,5).map(function(e){
    return {name: getItem(e[0])?getItem(e[0]).name:e[0], count:e[1]};
  });
  const thisMonthIssued = history.filter(function(h){ return h.action==="Issued" && h.date.getMonth()===today.getMonth() && h.date.getFullYear()===today.getFullYear(); }).length;
  const approachingExpiry = expiringItems(30);
  const staleItems = track.filter(function(i){
    const evs = history.filter(function(h){ return h.itemId===i.id; }).slice().sort(function(a,b){ return b.date-a.date; });
    const lastDate = evs.length ? evs[0].date : i.purchaseDate;
    return daysBetween(lastDate, today) > 90;
  });
  const trend = weeklyIssuedTrend(6);
  const predictions = stockPredictionList();
  return `
    <h3 class="sub-title">Analytics</h3>
    <div class="kpi-grid">
      <div class="kpi-cell"><div class="n" style="color:var(--green)">${util}%</div><div class="l">Utilization</div></div>
      <div class="kpi-cell"><div class="n" style="color:var(--red)">${downtimeItems.length}</div><div class="l">In Downtime</div></div>
      <div class="kpi-cell"><div class="n" style="color:var(--blue)">${thisMonthIssued}</div><div class="l">Issued This Month</div></div>
    </div>
    <h3 class="sub-title">Consumables Issued — Last 6 Weeks</h3>
    <div class="card">${barChartSvg(trend)}</div>
    <h3 class="sub-title">Repair Frequency (Top 5)</h3>
    <div class="card">
      ${mostRepaired.length ? barChartSvg(mostRepaired.map(r=>({label:r.name.length>10?r.name.slice(0,9)+'…':r.name, value:r.count, color:'var(--red)'}))) : `<div class="empty">No repair history yet</div>`}
    </div>
    <h3 class="sub-title">Stock Prediction — Days Remaining</h3>
    <div class="card">
      ${predictions.length ? predictions.map(p=>{
        const color = p.daysRemaining<7?'var(--red)':p.daysRemaining<21?'var(--amber)':'var(--green)';
        return `<div class="field-row"><span class="k">${p.name}</span><span class="v" style="color:${color}; font-weight:700;">~${p.daysRemaining}d left</span></div>`;
      }).join('') : `<div class="empty">Not enough issue history yet to predict — needs some Issued events logged first.</div>`}
    </div>
    <div class="card">
      <div class="field-row"><span class="k" style="font-weight:700;">Most Frequently Repaired</span></div>
      ${mostRepaired.length ? mostRepaired.map(function(r){ return `<div class="field-row"><span class="k">${r.name}</span><span class="v">${r.count}×</span></div>`; }).join('') : `<div class="empty">No repair history yet</div>`}
    </div>
    <div class="card">
      <div class="field-row"><span class="k">Approaching Expiry (≤30d)</span><span class="v">${approachingExpiry.length}</span></div>
      <div class="field-row"><span class="k">Not Scanned/Logged 90+ Days</span><span class="v">${staleItems.length}</span></div>
    </div>
    <div style="font-size:10px; color:var(--muted); margin:-2px 0 8px;">Monthly expenditure isn't tracked yet — add a cost field per item to enable it.</div>
  `;
}

/* ---------------- INIT ---------------- */
initTheme();
render();
handleIncomingScanLink();
const savedUrl = localStorage.getItem("nicuApiUrl");
if(savedUrl){ state.apiUrl = savedUrl; syncFromCloud(); }
