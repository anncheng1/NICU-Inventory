<style>
  :root{
    --blue:#2563eb; --blue-dark:#1d4ed8; --blue-light:#eff6ff;
    --bg:#eef1f8; --card:#ffffff; --card-hover:#f8fafc;
    --text:#0f172a; --muted:#64748b;
    --green:#16a34a; --green-light:#e7f8ed;
    --amber:#d97706; --amber-light:#fef6e7;
    --red:#dc2626; --red-light:#fdeeee;
    --purple:#7c3aed; --purple-light:#f3eefe;
    --border:#e5e9f2;
    --shadow-sm:0 1px 2px rgba(15,23,42,.05), 0 1px 1px rgba(15,23,42,.04);
    --shadow-md:0 6px 16px rgba(15,23,42,.08);
    --shadow-lg:0 16px 40px rgba(15,23,42,.16);
    --r-sm:10px; --r-md:14px; --r-lg:20px;
    color-scheme: light;
  }
  [data-theme="dark"]{
    --blue:#3b82f6; --blue-dark:#2563eb; --blue-light:#132743;
    --bg:#0a0f1c; --card:#131a2b; --card-hover:#182137;
    --text:#e7ecf5; --muted:#8a96ad;
    --green:#34d399; --green-light:#0f2a20;
    --amber:#fbbf24; --amber-light:#332209;
    --red:#f87171; --red-light:#331414;
    --purple:#a78bfa; --purple-light:#241a3d;
    --border:#232e47;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow-md:0 6px 16px rgba(0,0,0,.35);
    --shadow-lg:0 16px 40px rgba(0,0,0,.55);
    color-scheme: dark;
  }
  *{box-sizing:border-box;}
  html, body{ height:100%; }
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:#05070d; color:var(--text); display:flex; justify-content:center; padding:24px 12px;
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .phone{
    width:420px; max-width:100%; background:var(--bg); border-radius:32px; overflow:hidden;
    box-shadow:0 24px 70px rgba(0,0,0,.55); border:8px solid #111827;
    height:min(820px, calc(100vh - 48px)); height:min(820px, calc(100dvh - 48px));
    display:flex; flex-direction:column; position:relative;
    transition:background-color .25s ease;
  }
  header.appbar{
    background:linear-gradient(135deg,var(--blue),var(--blue-dark) 70%); color:#fff; padding:16px 16px 14px;
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    box-shadow:0 4px 14px rgba(37,99,235,.25);
  }
  header.appbar .title{font-weight:800; font-size:16.5px; letter-spacing:.2px;}
  header.appbar .sub{font-size:11px; opacity:.85; margin-top:1px;}
  select#roleSelect{
    background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.35);
    border-radius:9px; padding:6px 8px; font-size:12px; backdrop-filter:blur(4px);
  }
  select#roleSelect option{color:#111;}
  main{flex:1; overflow-y:auto; padding:14px; padding-bottom:8px; scrollbar-width:thin;}
  nav.tabbar{
    display:flex; border-top:1px solid var(--border); background:var(--card); flex-shrink:0;
    box-shadow:0 -4px 14px rgba(15,23,42,.05); transition:background-color .25s ease;
  }
  nav.tabbar button{
    flex:1; background:none; border:none; padding:9px 2px 10px; font-size:10.5px; color:var(--muted);
    display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; position:relative;
    transition:color .15s ease;
  }
  nav.tabbar button.active{color:var(--blue); font-weight:700;}
  nav.tabbar button .ic{font-size:18px; transition:transform .15s ease;}
  nav.tabbar button.active .ic{transform:translateY(-1px);}
  nav.tabbar button .badge{
    position:absolute; top:2px; right:22%; background:var(--red); color:#fff; border-radius:8px;
    font-size:9px; padding:1px 4px; font-weight:700; box-shadow:0 0 0 2px var(--card);
  }
  h2.section-title{font-size:16px; margin:0 0 10px; color:var(--text); font-weight:800; letter-spacing:-.1px;}
  h3.sub-title{font-size:11.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin:16px 0 8px; font-weight:700;}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:14px;}
  .stat-card{
    background:var(--card); border-radius:var(--r-md); padding:13px; border:1px solid var(--border);
    cursor:pointer; transition:transform .12s ease, box-shadow .12s ease; box-shadow:var(--shadow-sm);
  }
  .stat-card:active{transform:scale(.96);}
  .stat-card:hover{box-shadow:var(--shadow-md);}
  .stat-card .num{font-size:23px; font-weight:800; letter-spacing:-.5px;}
  .stat-card .lbl{font-size:11px; color:var(--muted); margin-top:2px; font-weight:600;}
  .stat-card.warn .num{color:var(--amber);}
  .stat-card.danger .num{color:var(--red);}
  .stat-card.ok .num{color:var(--green);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; border-radius:var(--r-sm);
    padding:11px 14px; font-size:13px; font-weight:700; cursor:pointer; width:100%;
    transition:transform .1s ease, filter .12s ease, box-shadow .12s ease; letter-spacing:.1px;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--blue); color:#fff; box-shadow:0 4px 12px rgba(37,99,235,.28);}
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-secondary{background:var(--card-hover); color:var(--text); border:1px solid var(--border);}
  .btn-outline{background:var(--card); color:var(--blue); border:1.5px solid var(--blue);}
  .btn-danger{background:var(--red-light); color:var(--red);}
  .btn-green{background:var(--green-light); color:var(--green);}
  .btn-row{display:flex; gap:8px; margin-top:10px;}
  .card{
    background:var(--card); border-radius:var(--r-md); padding:13px 14px; border:1px solid var(--border);
    margin-bottom:10px; box-shadow:var(--shadow-sm); transition:background-color .25s ease, border-color .25s ease;
  }
  .activity-item, .list-item{
    display:flex; align-items:center; justify-content:space-between; padding:10px 4px; border-bottom:1px solid var(--border);
    cursor:pointer; transition:background-color .12s ease; border-radius:8px;
  }
  .list-item:hover, .activity-item:hover{background:var(--card-hover);}
  .list-item:last-child, .activity-item:last-child{border-bottom:none;}
  .list-item .meta{font-size:11px; color:var(--muted);}
  .list-item .name{font-weight:700; font-size:13.5px;}
  .pill{
    font-size:10px; font-weight:700; padding:3.5px 9px; border-radius:999px; white-space:nowrap; letter-spacing:.2px;
  }
  .pill-working{background:var(--green-light); color:var(--green);}
  .pill-repair{background:var(--red-light); color:var(--red);}
  .pill-loaned{background:var(--amber-light); color:var(--amber);}
  .pill-calibration{background:var(--blue-light); color:var(--blue);}
  .pill-disposed{background:var(--border); color:var(--muted);}
  .pill-low{background:var(--red-light); color:var(--red);}
  .pill-ok{background:var(--green-light); color:var(--green);}
  .search-box{
    width:100%; padding:11px 12px; border-radius:var(--r-sm); border:1px solid var(--border); font-size:13px; margin-bottom:10px;
    background:var(--card); color:var(--text); transition:border-color .12s ease, box-shadow .12s ease;
  }
  .search-box:focus{outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-light);}
  .chip-row{display:flex; gap:6px; overflow-x:auto; margin-bottom:10px; padding-bottom:2px;}
  .chip{
    flex-shrink:0; background:var(--card); border:1px solid var(--border); border-radius:999px; padding:6px 12px;
    font-size:11.5px; cursor:pointer; white-space:nowrap; color:var(--muted); font-weight:600; transition:all .12s ease;
  }
  .chip.active{background:var(--blue); color:#fff; border-color:var(--blue); box-shadow:0 3px 8px rgba(37,99,235,.3);}
  .field-row{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px dashed var(--border); font-size:12.5px;}
  .field-row:last-child{border-bottom:none;}
  .field-row .k{color:var(--muted);}
  .field-row .v{font-weight:700; text-align:right;}
  .qr{
    width:132px; height:132px; margin:6px auto 4px; display:flex; align-items:center; justify-content:center;
    background:#fff; border:6px solid #111; border-radius:10px; box-shadow:var(--shadow-md);
  }
  .qr img, .qr canvas{ image-rendering:pixelated; }
  .qr-wrap{ text-align:center; }
  .cam-wrap{ position:relative; border-radius:var(--r-md); overflow:hidden; background:#000; margin-bottom:10px; box-shadow:var(--shadow-md); }
  .cam-wrap video{ width:100%; display:block; }
  .cam-frame{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:58%; aspect-ratio:1/1; max-width:230px; max-height:230px;
    border:3px solid #22c55e; border-radius:14px; pointer-events:none;
    box-shadow:0 0 0 2000px rgba(0,0,0,.45);
    transition:box-shadow .15s ease, border-color .15s ease;
  }
  .cam-frame.found{
    border-color:#22c55e; border-width:4px;
    box-shadow:0 0 0 8px rgba(34,197,94,.4), 0 0 0 2000px rgba(0,0,0,.45);
  }
  .cam-frame.found::after{
    content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:52px; font-weight:900; color:#22c55e; text-shadow:0 0 8px rgba(0,0,0,.5);
  }
  .scan-tabs{ display:flex; gap:6px; margin-bottom:10px; }
  .scan-tabs button{
    flex:1; padding:8px; border-radius:var(--r-sm); border:1px solid var(--border); background:var(--card); font-size:12px; font-weight:700; cursor:pointer; color:var(--muted);
    transition:all .12s ease;
  }
  .scan-tabs button.active{ background:var(--blue); color:#fff; border-color:var(--blue); }
  .cam-status{ font-size:11.5px; color:var(--muted); text-align:center; margin-bottom:8px; }
  .lc-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; text-align:center; }
  .lc-grid .lc-num{ font-size:16px; font-weight:800; color:var(--blue); }
  .lc-grid .lc-lbl{ font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; margin-top:2px; }
  .print-sheet{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; max-height:55vh; overflow-y:auto; }
  .sticker-card{
    border:1px dashed #94a3b8; border-radius:var(--r-sm); padding:8px; text-align:center; background:#fff;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .sticker-qr{ width:72px; height:72px; }
  .sticker-name{ font-size:10.5px; font-weight:700; line-height:1.2; color:#0f172a; }
  .sticker-id{ font-size:9px; color:#64748b; letter-spacing:.4px; }
  .sticker-cat{ font-size:8.5px; color:#64748b; }
  @media print{
    body *{ visibility:hidden; }
    #printSheet, #printSheet *{ visibility:visible; }
    #printSheet{
      position:absolute; top:0; left:0; width:100%; max-height:none; overflow:visible;
      grid-template-columns:repeat(3,1fr);
    }
    .no-print{ display:none !important; }
  }
  .back-btn{background:none; border:none; color:var(--blue); font-size:13px; font-weight:700; cursor:pointer; padding:0 0 10px; display:flex; align-items:center; gap:4px;}
  .stock-box{display:flex; align-items:center; justify-content:center; gap:16px; margin:14px 0;}
  .stock-box button{
    width:42px; height:42px; border-radius:50%; border:none; font-size:18px; font-weight:800; cursor:pointer;
    transition:transform .1s ease; box-shadow:var(--shadow-sm);
  }
  .stock-box button:active{transform:scale(.9);}
  .stock-box .minus{background:var(--red-light); color:var(--red);}
  .stock-box .plus{background:var(--green-light); color:var(--green);}
  .stock-box .val{font-size:27px; font-weight:800; min-width:52px; text-align:center;}
  .notif{
    display:flex; gap:10px; align-items:flex-start; padding:11px; border-radius:var(--r-sm); margin-bottom:8px; border:1px solid var(--border);
  }
  .notif.low{background:var(--red-light);}
  .notif.exp{background:var(--amber-light);}
  .notif.cal{background:var(--blue-light);}
  .notif .ic{font-size:18px;}
  .notif .t{font-weight:700; font-size:12.5px;}
  .notif .d{font-size:11px; color:var(--muted);}
  .modal-overlay{
    position:absolute; inset:0; background:rgba(5,8,16,.55); display:flex; align-items:flex-end; z-index:50;
    backdrop-filter:blur(2px); animation:fadeIn .15s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .modal{
    background:var(--card); color:var(--text); width:100%; border-radius:var(--r-lg) var(--r-lg) 0 0; padding:16px; max-height:85%; overflow-y:auto;
    box-shadow:var(--shadow-lg); animation:slideUp .18s ease;
  }
  @keyframes slideUp{ from{transform:translateY(24px); opacity:.6;} to{transform:translateY(0); opacity:1;} }
  .modal-overlay-top{ align-items:flex-start; }
  .modal-top{ border-radius:0 0 var(--r-lg) var(--r-lg); animation:slideDown .18s ease; }
  @keyframes slideDown{ from{transform:translateY(-24px); opacity:.6;} to{transform:translateY(0); opacity:1;} }
  .modal h3{margin:0 0 10px;}
  .locrow{
    display:flex; align-items:center; justify-content:space-between; padding:10px 4px; border-bottom:1px solid var(--border);
  }
  .found-btn{border:none; border-radius:var(--r-sm); padding:8px 13px; font-weight:700; font-size:13px; cursor:pointer; transition:transform .1s ease;}
  .found-btn:active{transform:scale(.92);}
  .toast{
    position:absolute; bottom:70px; left:50%; transform:translateX(-50%); background:#111827; color:#fff;
    padding:10px 18px; border-radius:999px; font-size:12px; z-index:60; opacity:0; transition:opacity .25s, transform .25s;
    box-shadow:var(--shadow-lg);
  }
  .toast.show{opacity:1;}
  .empty{text-align:center; color:var(--muted); font-size:12.5px; padding:20px 0;}
  table.rpt{width:100%; border-collapse:collapse; font-size:11.5px; margin-top:8px;}
  table.rpt th, table.rpt td{text-align:left; padding:7px 5px; border-bottom:1px solid var(--border);}
  table.rpt th{color:var(--muted); font-weight:700; text-transform:uppercase; font-size:9.5px; letter-spacing:.3px;}
  .rolebadge{font-size:10px; background:rgba(255,255,255,.2); padding:2px 7px; border-radius:6px; margin-top:2px; display:inline-block;}
  .cloud-btn, .theme-btn{
    background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.35); color:#fff; border-radius:9px;
    padding:5px 8px; font-size:13px; cursor:pointer; position:relative; line-height:1; transition:background .12s ease;
  }
  .cloud-btn:hover, .theme-btn:hover{background:rgba(255,255,255,.28);}
  .cloud-dot{
    position:absolute; top:-2px; right:-2px; width:9px; height:9px; border-radius:50%; border:1.5px solid var(--blue-dark);
  }
  .dot-local{background:#94a3b8;} .dot-connected{background:#22c55e;} .dot-error{background:#ef4444;}
  #notifDot{ background:var(--red); }
  .notif-center-panel{
    position:absolute; top:40px; right:0; width:300px; max-height:400px; overflow-y:auto; z-index:60;
    background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); box-shadow:var(--shadow-lg);
    text-align:left; color:var(--text); animation:fadeIn .12s ease;
  }
  .notif-center-panel .hd{ padding:10px 12px; font-weight:800; font-size:12.5px; border-bottom:1px solid var(--border); }
  .notif-center-panel .row{ display:flex; gap:8px; align-items:flex-start; padding:9px 12px; border-bottom:1px solid var(--border); cursor:pointer; font-size:11.5px; }
  .notif-center-panel .row:hover{ background:var(--card-hover); }
  .notif-center-panel .row:last-child{ border-bottom:none; }
  .notif-center-panel .foot{ padding:8px 12px; text-align:center; }
  .notif-center-panel .foot button{ background:none; border:none; color:var(--blue); font-weight:700; font-size:11.5px; cursor:pointer; }
  .sync-banner{
    font-size:11px; padding:8px 11px; border-radius:var(--r-sm); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between;
    font-weight:600;
  }
  .sync-banner.local{background:var(--card); border:1px solid var(--border); color:var(--muted);}
  .sync-banner.connected{background:var(--green-light); color:var(--green);}
  .sync-banner.error{background:var(--red-light); color:var(--red);}
  .sync-banner a{color:inherit; font-weight:700; text-decoration:underline; cursor:pointer; background:none; border:none; font-size:11px; padding:0;}
  .modal textarea, .modal input[type=text], .modal input[type=date]{
    width:100%; padding:9px 10px; border-radius:var(--r-sm); border:1px solid var(--border); font-size:12.5px; margin-bottom:8px; font-family:inherit;
    background:var(--card); color:var(--text);
  }
  .spin{display:inline-block; animation:spin 1s linear infinite;}
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* ---- charts & visual indicators ---- */
  .chart-card{ display:flex; align-items:center; gap:14px; }
  .donut-wrap{ position:relative; flex-shrink:0; width:96px; height:96px; }
  .donut-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .donut-center .n{ font-size:19px; font-weight:800; }
  .donut-center .l{ font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; }
  .legend{ flex:1; display:flex; flex-direction:column; gap:6px; }
  .legend-row{ display:flex; align-items:center; gap:7px; font-size:11.5px; }
  .legend-dot{ width:9px; height:9px; border-radius:3px; flex-shrink:0; }
  .legend-lbl{ flex:1; color:var(--text); font-weight:600; }
  .legend-val{ color:var(--muted); font-weight:700; }
  .bar-row{ margin-bottom:9px; }
  .bar-row:last-child{ margin-bottom:0; }
  .bar-top{ display:flex; justify-content:space-between; font-size:11.5px; margin-bottom:4px; }
  .bar-top .n{ font-weight:600; }
  .bar-top .v{ color:var(--muted); font-weight:700; }
  .bar-track{ height:8px; border-radius:6px; background:var(--border); overflow:hidden; }
  .bar-fill{ height:100%; border-radius:6px; transition:width .3s ease; }
  .ring-row{ display:flex; align-items:center; gap:12px; }
  .ring-wrap{ position:relative; width:64px; height:64px; flex-shrink:0; }
  .ring-center{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; }
  .ring-lbl{ font-size:12.5px; font-weight:700; }
  .ring-sub{ font-size:10.5px; color:var(--muted); margin-top:1px; }
  .kpi-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; text-align:center; margin-bottom:10px; }
  .kpi-cell .n{ font-size:17px; font-weight:800; }
  .kpi-cell .l{ font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; margin-top:1px; }

  /* ---- filters / batch select ---- */
  .filter-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .filter-btn{
    display:flex; align-items:center; gap:5px; background:var(--card); border:1px solid var(--border); border-radius:999px;
    padding:6px 12px; font-size:11.5px; font-weight:700; color:var(--text); cursor:pointer;
  }
  .filter-btn .n{ background:var(--blue); color:#fff; border-radius:999px; font-size:9px; padding:1px 6px; }
  .toggle-row{ display:flex; align-items:center; justify-content:space-between; padding:9px 2px; border-bottom:1px solid var(--border); font-size:12.5px; }
  .toggle-row:last-child{ border-bottom:none; }
  .switch{ position:relative; width:38px; height:22px; flex-shrink:0; }
  .switch input{ opacity:0; width:0; height:0; }
  .switch .track{ position:absolute; inset:0; background:var(--border); border-radius:999px; cursor:pointer; transition:background .15s ease; }
  .switch .knob{ position:absolute; top:2px; left:2px; width:18px; height:18px; background:#fff; border-radius:50%; transition:transform .15s ease; box-shadow:var(--shadow-sm); }
  .switch input:checked + .track{ background:var(--blue); }
  .switch input:checked + .track .knob{ transform:translateX(16px); }
  .select-bar{
    position:sticky; bottom:-14px; margin:10px -14px -8px; background:var(--card); border-top:1px solid var(--border);
    padding:10px 12px; display:flex; align-items:center; gap:8px; box-shadow:0 -8px 20px rgba(15,23,42,.12); z-index:5;
  }
  .select-bar .cnt{ font-size:12px; font-weight:700; color:var(--text); flex-shrink:0; }
  .select-bar .btn{ width:auto; padding:8px 10px; font-size:11px; }
  .sel-checkbox{
    width:20px; height:20px; border-radius:6px; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:12px; color:#fff; transition:all .12s ease;
  }
  .sel-checkbox.checked{ background:var(--blue); border-color:var(--blue); }

  /* ---- audit visual ---- */
  .audit-ring-wrap{ position:relative; width:120px; height:120px; margin:4px auto 8px; }
  .audit-ring-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .audit-ring-center .pct{ font-size:26px; font-weight:800; }
  .audit-ring-center .lbl{ font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; }
  .audit-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .audit-card{
    border-radius:var(--r-md); padding:11px; border:1.5px solid var(--border); background:var(--card);
    display:flex; flex-direction:column; gap:6px; transition:all .15s ease; box-shadow:var(--shadow-sm);
  }
  .audit-card.found{ border-color:var(--green); background:var(--green-light); }
  .audit-card.missing{ border-color:var(--red); background:var(--red-light); }
  .audit-card .aic{ font-size:22px; }
  .audit-card .an{ font-size:12px; font-weight:700; line-height:1.25; }
  .audit-card .ac{ font-size:9.5px; color:var(--muted); }
  .audit-card .abtns{ display:flex; gap:6px; margin-top:2px; }
  .audit-card .abtns button{ flex:1; }
  .location-card{
    display:flex; align-items:center; gap:11px; padding:12px; border-radius:var(--r-md); background:var(--card);
    border:1px solid var(--border); margin-bottom:8px; cursor:pointer; transition:all .12s ease; box-shadow:var(--shadow-sm);
  }
  .location-card:hover{ box-shadow:var(--shadow-md); transform:translateY(-1px); }
  .location-card .lic{ font-size:22px; width:40px; height:40px; border-radius:11px; background:var(--blue-light); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .location-card .ltxt{ flex:1; }
  .location-card .lname{ font-weight:700; font-size:13.5px; }
  .location-card .lmeta{ font-size:11px; color:var(--muted); }
  .mini-ring{ position:relative; width:34px; height:34px; flex-shrink:0; }
  .mini-ring-txt{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; }

  /* ---- export ---- */
  .export-grid{ display:grid; grid-template-columns:1fr; gap:8px; }
  .export-card{
    display:flex; align-items:center; gap:11px; padding:12px; border-radius:var(--r-md); background:var(--card);
    border:1px solid var(--border); cursor:pointer; transition:all .12s ease; box-shadow:var(--shadow-sm);
  }
  .export-card:hover{ box-shadow:var(--shadow-md); }
  .export-card .eic{ font-size:20px; width:38px; height:38px; border-radius:10px; background:var(--purple-light); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .export-card .etxt{ flex:1; }
  .export-card .en{ font-weight:700; font-size:13px; }
  .export-card .ed{ font-size:10.5px; color:var(--muted); }

  /* ---- v3: dashboard quick actions / modules / map / timeline / trolley / AI ---- */
  .today-banner{ font-size:11.5px; font-weight:700; color:var(--blue); background:var(--blue-light); border-radius:var(--r-sm); padding:8px 11px; margin-bottom:10px; }
  .quick-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
  .quick-btn{
    background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:12px 6px; text-align:center;
    cursor:pointer; box-shadow:var(--shadow-sm); transition:all .12s ease;
  }
  .quick-btn:active{ transform:scale(.95); }
  .quick-btn:hover{ box-shadow:var(--shadow-md); }
  .quick-btn .qic{ font-size:20px; margin-bottom:4px; }
  .quick-btn .qlbl{ font-size:10px; font-weight:700; color:var(--text); line-height:1.2; }
  .module-grid{ display:flex; flex-direction:column; gap:10px; margin-bottom:12px; }
  .home-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:0 0 16px; }
  .home-btn{
    background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px 10px; text-align:center;
    cursor:pointer; box-shadow:var(--shadow-sm); transition:all .12s ease;
  }
  .home-btn:active{ transform:scale(.96); }
  .home-btn:hover{ box-shadow:var(--shadow-md); border-color:var(--blue); }
  .home-btn .hic{ font-size:34px; margin-bottom:8px; }
  .home-btn .hlbl{ font-size:13px; font-weight:800; color:var(--text); line-height:1.25; }
  @media (min-width:1024px){
    .home-grid{ grid-template-columns:repeat(3,1fr); max-width:720px; margin-left:auto; margin-right:auto; }
  }
  .module-card{
    display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:var(--r-md);
    padding:16px; cursor:pointer; box-shadow:var(--shadow-sm); transition:all .12s ease;
  }
  .module-card:hover{ box-shadow:var(--shadow-md); transform:translateY(-1px); }
  .module-card .mic{ font-size:28px; width:48px; height:48px; border-radius:12px; background:var(--blue-light); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .module-card .mtxt{ flex:1; }
  .module-card .mname{ font-weight:800; font-size:14.5px; }
  .module-card .mdesc{ font-size:10.5px; color:var(--muted); margin-top:1px; }
  .module-card .mcount{ font-size:20px; font-weight:800; color:var(--blue); }
  .map-grid{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .map-card{
    background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:13px; cursor:pointer;
    box-shadow:var(--shadow-sm); transition:all .12s ease; position:relative;
  }
  .map-card:hover{ box-shadow:var(--shadow-md); transform:translateY(-1px); }
  .map-card.has-repair{ border-color:var(--red); }
  .map-card.has-missing{ border-color:var(--amber); }
  .map-dot{ width:9px; height:9px; border-radius:50%; position:absolute; top:12px; right:12px; }
  .map-loc{ font-weight:800; font-size:13px; margin-top:2px; }
  .map-count{ font-size:10.5px; color:var(--muted); margin-top:2px; }
  .map-section-label{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:16px 0 8px; }
  .map-section-label:first-of-type{ margin-top:0; }
  .map-icons{ display:flex; gap:3px; margin-top:7px; flex-wrap:wrap; font-size:13px; }
  .map-missing-badge{
    display:inline-flex; align-items:center; gap:3px; font-size:9.5px; font-weight:800; color:#fff;
    background:var(--red); border-radius:999px; padding:2px 7px; margin-top:7px;
  }
  @media (min-width:1024px){
    .map-grid{ grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); }
  }
  .photo-box{ width:100%; border-radius:var(--r-md); margin-bottom:10px; overflow:hidden; box-shadow:var(--shadow-sm); }
  .photo-box img{ width:100%; display:block; }
  .photo-placeholder{
    width:100%; aspect-ratio:4/3; border-radius:var(--r-md); background:var(--card-hover); border:1.5px dashed var(--border);
    display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12px; margin-bottom:10px;
  }
  .timeline{ position:relative; padding-left:22px; margin:8px 0; }
  .timeline-item{ position:relative; padding-bottom:16px; }
  .timeline-item:last-child{ padding-bottom:0; }
  .timeline-item::before{ content:""; position:absolute; left:-15px; top:22px; bottom:-2px; width:2px; background:var(--border); }
  .timeline-item:last-child::before{ display:none; }
  .tl-dot{
    position:absolute; left:-27px; top:0; width:22px; height:22px; border-radius:50%; background:var(--card);
    border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px;
  }
  .timeline-item.current .tl-dot{ background:var(--blue); border-color:var(--blue); }
  .tl-label{ font-size:12.5px; font-weight:700; }
  .tl-date{ font-size:10.5px; color:var(--muted); margin-top:1px; }
  .checklist-item{
    display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--border); cursor:pointer;
  }
  .checklist-item:last-child{ border-bottom:none; }
  .cl-check{
    width:24px; height:24px; border-radius:7px; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center;
    justify-content:center; font-size:14px; color:#fff; font-weight:800; transition:all .12s ease;
  }
  .cl-check.checked{ background:var(--green); border-color:var(--green); }
  .cl-label{ font-size:13px; font-weight:600; }
  .ai-thread{ flex:1; overflow-y:auto; max-height:44vh; padding:2px 2px 4px; }
  .ai-bubble{ max-width:88%; padding:9px 12px; border-radius:14px; font-size:12.5px; line-height:1.4; margin-bottom:8px; }

  .notif.sev-amber{ border-left:4px solid var(--amber); }
  .notif.sev-green{ border-left:4px solid var(--green); }
  .audit-card.wrong{ border-color:var(--purple); background:var(--purple-light); }

  .modal textarea{ min-height:64px; resize:vertical; }

  /* ---------------- DESKTOP THREE-PANEL SHELL ---------------- */
  /* Below 1024px this app is exactly what it always was — a phone-first single column.
     At 1024px+ it switches into a persistent sidebar + table + detail-panel layout,
     since page-hopping through a dozen scans a day is a mobile pattern, not a desktop one. */
  .sidebar{ display:none; }
  .detail-panel{ display:none; }

  @media (min-width: 1024px){
    body{ padding:0; align-items:stretch; }
    .phone{
      width:100%; max-width:1600px; height:100vh; height:100dvh; margin:0; border-radius:0; border:none;
      box-shadow:none; display:grid;
      grid-template-columns:224px 1fr 380px;
      grid-template-rows:auto 1fr;
      grid-template-areas:
        "header header header"
        "sidebar main detail";
    }
    header.appbar{ grid-area:header; }
    .sidebar{
      grid-area:sidebar; display:flex; flex-direction:column; gap:2px; padding:14px 10px;
      overflow-y:auto; border-right:1px solid var(--border); background:var(--card);
    }
    main#main{ grid-area:main; overflow-y:auto; padding:20px 26px; }
    .detail-panel{
      grid-area:detail; display:block; overflow-y:auto; padding:20px 18px;
      border-left:1px solid var(--border); background:var(--card);
    }
    nav.tabbar{ display:none; } /* the sidebar replaces bottom-tab navigation on desktop */

    .sidebar-section{ margin-bottom:16px; }
    .sidebar-section-label{
      font-size:10px; font-weight:800; letter-spacing:.6px; text-transform:uppercase;
      color:var(--muted); padding:6px 10px 5px;
    }
    .sidebar-link{
      display:flex; align-items:center; gap:10px; width:100%; text-align:left;
      padding:9px 10px; border-radius:var(--r-sm); border:none; background:transparent;
      color:var(--text); font-size:13px; font-weight:600; cursor:pointer; position:relative;
    }
    .sidebar-link:hover{ background:var(--card-hover); }
    .sidebar-link.active{ background:var(--blue); color:#fff; }
    .sidebar-link .ic{ font-size:15px; width:20px; text-align:center; flex-shrink:0; }
    .sidebar-link .badge{
      margin-left:auto; background:var(--red); color:#fff; font-size:10px; font-weight:800;
      border-radius:999px; padding:1px 6px;
    }

    /* Inventory: desktop gets a real sortable table instead of the mobile card list. */
    .mobile-list{ display:none; }
    .desktop-table-wrap{ display:block; }
    .desktop-table{ width:100%; border-collapse:collapse; font-size:12.5px; }
    .desktop-table th{
      text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted);
      padding:9px 10px; border-bottom:2px solid var(--border); cursor:pointer; user-select:none; white-space:nowrap;
    }
    .desktop-table th:hover{ color:var(--text); }
    .desktop-table th .arrow{ margin-left:4px; opacity:.7; }
    .desktop-table td{ padding:9px 10px; border-bottom:1px solid var(--border); }
    .desktop-table tbody tr{ cursor:pointer; }
    .desktop-table tbody tr:hover{ background:var(--card-hover); }
    .desktop-table tbody tr.selected-row{ background:rgba(37,99,235,.14); }
    .detail-panel-empty{ color:var(--muted); font-size:12.5px; text-align:center; padding:40px 10px; }
  }
  @media (max-width: 1023px){
    .desktop-table-wrap{ display:none; }
  }
</style>

/* ---- Real NICU ward layout: each ward's beds get a "Ward - Bed N" name so the same
   bed number in different wards (e.g. Bed 1 in Intensive vs Bed 1 in Convalescent)
   never collides. ---- */
const NICU_WARDS = [
  { name:"Intensive NICU", beds:10, extra:["Isolation Room 1","Isolation Room 2"] },
  { name:"Semi-Intensive NICU", beds:10, extra:[] },
  { name:"Convalescent Unit", beds:12, extra:[] },
  { name:"Rooming-In Cubicle", beds:10, extra:[] },
];
function generateWardLocations(){
  const list = [];
  NICU_WARDS.forEach(w=>{
    for(let i=1;i<=w.beds;i++) list.push(`${w.name} - Bed ${i}`);
    w.extra.forEach(e=>list.push(`${w.name} - ${e}`));
  });
  return list;
}
/* ---- Explicit location registry: computed fresh every load from three simple pieces —
   the fixed ward baseline, anything custom the user added, minus anything they explicitly
   deleted. This is deliberately NOT a "seed once, then trust whatever's cached" approach:
   that kind of one-time-flag logic can get permanently stuck if an earlier version of this
   code ever ran and cached an incomplete result — recomputing from scratch every time makes
   that class of bug impossible. Deletions still stick (they're tracked explicitly), so
   removing something doesn't make it reappear on the next load. ---- */
let CUSTOM_LOCATIONS = [];
let DELETED_LOCATIONS = [];
try{ CUSTOM_LOCATIONS = JSON.parse(localStorage.getItem("nicuLocCustom") || "[]") || []; }catch(e){ CUSTOM_LOCATIONS = []; }
try{ DELETED_LOCATIONS = JSON.parse(localStorage.getItem("nicuLocDeleted") || "[]") || []; }catch(e){ DELETED_LOCATIONS = []; }
function saveLocationOverrides(){
  try{ localStorage.setItem("nicuLocCustom", JSON.stringify(CUSTOM_LOCATIONS)); }catch(e){}
  try{ localStorage.setItem("nicuLocDeleted", JSON.stringify(DELETED_LOCATIONS)); }catch(e){}
}
function computeLocations(){
  const wardBase = generateWardLocations().filter(l=>!DELETED_LOCATIONS.includes(l));
  const custom = CUSTOM_LOCATIONS.filter(l=>!DELETED_LOCATIONS.includes(l));
  const fromItems = items.filter(i=>i.location).map(i=>i.location).filter(l=>!DELETED_LOCATIONS.includes(l));
  return [...new Set([...wardBase, ...custom, ...fromItems])];
}
let LOCATIONS = computeLocations();
function saveLocations(){ saveLocationOverrides(); LOCATIONS = computeLocations(); }
/* ---- Location management (create / rename / delete beds & rooms) ---- */
function openLocationModal(loc){
  if(!PERMS[state.role].manage){ showToast("Your role can't manage locations"); return; }
  state.modal = "locationEdit";
  state.locationEditing = loc || null; // null = creating a new location
  render();
}
function closeLocationModal(){ state.modal = null; state.locationEditing = null; render(); }
function submitLocationModal(){
  const name = (document.getElementById('locationNameInput')||{}).value?.trim();
  if(!name){ showToast("Enter a location name"); return; }
  const editing = state.locationEditing;
  if(editing){
    if(name.toLowerCase()!==editing.toLowerCase() && LOCATIONS.some(l=>l.toLowerCase()===name.toLowerCase())){
      showToast(`"${name}" already exists`); return;
    }
    // Renaming works the same whether the old name came from the ward baseline or was
    // custom-added: mark the old name deleted (so it can't resurface) and add the new
    // name as custom.
    if(!DELETED_LOCATIONS.includes(editing)) DELETED_LOCATIONS.push(editing);
    CUSTOM_LOCATIONS = CUSTOM_LOCATIONS.filter(l=>l!==editing);
    DELETED_LOCATIONS = DELETED_LOCATIONS.filter(l=>l!==name); // in case they're reviving something
    if(!CUSTOM_LOCATIONS.includes(name)) CUSTOM_LOCATIONS.push(name);
    let updated = 0;
    items.forEach(i=>{ if(i.location===editing){ i.location=name; updated++; } });
    saveLocations();
    postAction("renameLocation", {oldName:editing, newName:name});
    showToast(`Renamed to "${name}"${updated?` — updated ${updated} item${updated===1?'':'s'}`:''}`);
  } else {
    if(LOCATIONS.some(l=>l.toLowerCase()===name.toLowerCase())){ showToast(`"${name}" already exists`); return; }
    DELETED_LOCATIONS = DELETED_LOCATIONS.filter(l=>l!==name);
    if(!CUSTOM_LOCATIONS.includes(name)) CUSTOM_LOCATIONS.push(name);
    saveLocations();
    postAction("addLocation", {name});
    showToast(`Added location "${name}"`);
  }
  closeLocationModal();
}
function deleteLocation(loc){
  if(!PERMS[state.role].manage){ showToast("Your role can't manage locations"); return; }
  const count = trackable().filter(i=>i.location===loc).length;
  if(count>0){ showToast(`Can't delete "${loc}" — ${count} item${count===1?'':'s'} still there. Move them first.`); return; }
  if(!confirm(`Delete the location "${loc}"? This can't be undone.`)) return;
  if(!DELETED_LOCATIONS.includes(loc)) DELETED_LOCATIONS.push(loc);
  CUSTOM_LOCATIONS = CUSTOM_LOCATIONS.filter(l=>l!==loc);
  saveLocations();
  postAction("deleteLocation", {name:loc});
  showToast(`Deleted "${loc}"`);
  render();
}

// Every call to render() rebuilds large chunks of the DOM from scratch
// (main.innerHTML = ..., sidebar.innerHTML = ..., etc). Text inputs whose
// oninput handler calls render() on every keystroke -- like the inventory
// search box ("state.invSearch=this.value; render();") -- were getting torn
// down and recreated on each character. The browser has to refocus a brand
// new <input> element after that, and it always lands the cursor at the
// end, so anything but appending a single trailing character felt like
// typing was "getting interrupted" (cursor jumping, keystrokes dropped).
// This wrapper snapshots which element had focus and its cursor/selection
// position before the rebuild, then restores both afterwards.
function render(){
  const active = document.activeElement;
  let focusInfo = null;
  if(active && active.id && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')){
    focusInfo = { id: active.id };
    try{ focusInfo.selStart = active.selectionStart; focusInfo.selEnd = active.selectionEnd; }catch(e){ /* some input types (date, number) don't support selection ranges */ }
  }
  renderRaw();
  if(focusInfo){
    const el = document.getElementById(focusInfo.id);
    if(el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')){
      el.focus();
      if(focusInfo.selStart != null){
        try{ el.setSelectionRange(focusInfo.selStart, focusInfo.selEnd); }catch(e){ /* ignore for input types that don't support it */ }
      }
    }
  }
}

/* ---- Chart helpers (pure SVG, no external deps) ---- */
function donutChart(segments, opts){
  opts = opts || {};
  const size = opts.size || 96, stroke = opts.stroke || 14;
  const r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const total = segments.reduce((s,x)=>s+x.value, 0) || 1;
  let offset = 0;
  const circles = segments.filter(s=>s.value>0).map(seg=>{
    const frac = seg.value / total;
    const dash = frac * c;
    const el = `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${c-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${size/2} ${size/2})"/>`;
    offset += dash;
    return el;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>
    ${circles}
  </svg>`;
}
function ringChart(pct, opts){
  opts = opts || {};
  const size = opts.size || 64, stroke = opts.stroke || 7, color = opts.color || 'var(--blue)';
  const r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const p = Math.max(0, Math.min(100, pct));
  const dash = (p/100) * c;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${c-dash}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/>
  </svg>`;
}
function statusColor(s){
  return {Working:"var(--green)", Repair:"var(--red)", Calibration:"var(--blue)", Loaned:"var(--amber)", Disposed:"var(--muted)"}[s] || "var(--muted)";
}
function barChartSvg(data, opts){
  opts = opts || {};
  const w = opts.width || 300, h = opts.height || 120, gap = 8;
  const max = Math.max(1, ...data.map(d=>d.value));
  const n = data.length || 1;
  const barW = Math.max(10, (w - gap*(n+1)) / n);
  const bars = data.map((d,i)=>{
    const barH = Math.round((d.value/max) * (h-28));
    const x = gap + i*(barW+gap);
    const y = h - barH - 18;
    return `
      <rect x="${x}" y="${y}" width="${barW}" height="${Math.max(barH,2)}" rx="3" fill="${d.color||'var(--blue)'}"/>
      <text x="${x+barW/2}" y="${h-5}" text-anchor="middle" font-size="8" fill="var(--muted)">${d.label}</text>
      <text x="${x+barW/2}" y="${y>10?y-4:12}" text-anchor="middle" font-size="9" font-weight="700" fill="var(--text)">${d.value}</text>
    `;
  }).join('');
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${data.length?bars:''}</svg>`;
}
function stockBarRow(item){
  const pct = Math.max(4, Math.round((item.currentStock/(item.maxStock||1))*100));
  const color = item.currentStock < item.minStock ? "var(--red)" : (item.currentStock < item.minStock*1.5 ? "var(--amber)" : "var(--green)");
  return `<div class="bar-row"><div class="bar-top"><span class="n">${item.name}</span><span class="v">${item.currentStock}/${item.maxStock}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${color};"></div></div></div>`;
}

const STATUS_FILTER_OPTIONS = ["Working","Repair","Calibration","Loaned","Disposed","Low Stock","OK Stock"];
function allItemLocations(){
  return [...new Set(items.map(i=>i.type==='consumable'?i.storeLocation:i.location).filter(Boolean))];
}
function getFilteredSortedItems(){
  let list = items.filter(i=>{
    if(state.invModule && i.type!==state.invModule) return false;
    if(!state.invModule && state.invFilter!=="All" && i.type!==state.invFilter) return false;
    if(state.invModule && state.invFilter!=="All" && i.category!==state.invFilter) return false;
    if(state.invSearch && !i.name.toLowerCase().includes(state.invSearch.toLowerCase()) && !i.id.toLowerCase().includes(state.invSearch.toLowerCase())) return false;
    if(state.filters.statuses.length){
      if(i.type==='consumable'){
        const isLow = i.currentStock < i.minStock;
        const wantsLow = state.filters.statuses.includes('Low Stock');
        const wantsOk = state.filters.statuses.includes('OK Stock');
        const otherStatusesSelected = state.filters.statuses.some(s=>!['Low Stock','OK Stock'].includes(s));
        if(otherStatusesSelected && !wantsLow && !wantsOk) return false;
        if((wantsLow||wantsOk) && !((wantsLow&&isLow)||(wantsOk&&!isLow))) return false;
      } else {
        const wantsStockOnly = state.filters.statuses.every(s=>['Low Stock','OK Stock'].includes(s));
        if(wantsStockOnly) return false;
        if(!state.filters.statuses.includes(i.status)) return false;
      }
    }
    if(state.filters.location!=="All"){
      const loc = i.type==='consumable' ? i.storeLocation : i.location;
      if(loc !== state.filters.location) return false;
    }
    if(state.filters.unit && state.filters.unit!=="All" && i.unit!==state.filters.unit) return false;
    return true;
  });
  const sortBy = state.filters.sortBy;
  list = list.slice().sort((a,b)=>{
    if(sortBy==='status') return String(a.status||'').localeCompare(String(b.status||''));
    if(sortBy==='category') return String(a.category||'').localeCompare(String(b.category||''));
    if(sortBy==='location') return String(a.location||a.storeLocation||'').localeCompare(String(b.location||b.storeLocation||''));
    if(sortBy==='expiry'){
      const av = a.expiryDate || a.nextPM || new Date(9999,0,1);
      const bv = b.expiryDate || b.nextPM || new Date(9999,0,1);
      return av - bv;
    }
    if(sortBy==='stock') return (a.currentStock ?? 999) - (b.currentStock ?? 999);
    return a.name.localeCompare(b.name);
  });
  return list;
}
function groupItemsByCategory(list){
  const map = new Map();
  list.forEach(i=>{
    const cat = i.category || "Other";
    if(!map.has(cat)) map.set(cat, []);
    map.get(cat).push(i);
  });
  return [...map.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
}

/* ---- Batch select / bulk operations ---- */
function toggleSelectMode(){ state.selectMode = !state.selectMode; state.selectedIds.clear(); render(); }
function toggleSelectItem(id){
  if(state.selectedIds.has(id)) state.selectedIds.delete(id); else state.selectedIds.add(id);
  render();
}
function selectedItemObjs(){ return [...state.selectedIds].map(getItem).filter(Boolean); }
function batchMove(){
  const sel = selectedItemObjs();
  const trackableSel = sel.filter(i=>i.type!=='consumable');
  if(trackableSel.length===0){ showToast("Select equipment/non-consumable items to move"); return; }
  if(!PERMS[state.role].move){ showToast("Your role can't move assets"); return; }
  const loc = prompt(`Move ${trackableSel.length} item(s) to location:`);
  if(!loc) return;
  trackableSel.forEach(it=>{
    const from = it.location;
    movements.unshift({itemId:it.id, from, via:null, to:loc, date:today});
    logHistory(it.id, "Moved", `${from} → ${loc}`, loc);
    it.location = loc;
    postAction("moveAsset", {id:it.id, to:loc, who:state.role});
  });
  showToast(`Moved ${trackableSel.length} item(s) to ${loc}`);
  state.selectMode = false; state.selectedIds.clear();
  render();
}
function batchRemove(){
  const sel = selectedItemObjs();
  if(sel.length===0) return;
  if(!PERMS[state.role].manage){ showToast("Your role can't remove items"); return; }
  if(!confirm(`Remove ${sel.length} item(s) from the registry? This cannot be undone.`)) return;
  sel.forEach(it=>{
    logHistory(it.id, "Removed", "Bulk removal");
    postAction("deleteItem", {id:it.id, sheet: it.type==="consumable" ? "Consumables" : "Equipment"});
  });
  const ids = new Set(sel.map(i=>i.id));
  items = items.filter(i=>!ids.has(i.id));
  showToast(`Removed ${sel.length} item(s)`);
  state.selectMode = false; state.selectedIds.clear();
  render();
}
function batchExport(){
  const sel = selectedItemObjs();
  if(sel.length===0) return;
  const headers = ["ID","Type","Name","Category","Status/Stock","Location"];
  const rows = sel.map(i=>[i.id, i.type, i.name, i.category, i.type==='consumable'?`${i.currentStock}/${i.maxStock}`:i.status, i.type==='consumable'?i.storeLocation:i.location]);
  downloadCsv("selected_items.csv", headers, rows);
  showToast(`Exported ${sel.length} item(s)`);
}

function adjustStock(id, delta){
  const it = getItem(id);
  if(delta<0 && !PERMS[state.role].issue){ showToast("Your role can't issue stock"); return; }
  if(delta>0 && !PERMS[state.role].receive){ showToast("Your role can't receive stock"); return; }
  if(it.currentStock+delta<0) return;
  it.currentStock += delta;
  if(delta<0) it.totalIssued = (it.totalIssued||0) + Math.abs(delta);
  logHistory(id, delta<0?"Issued":"Stock received", delta<0?"Issued to patient care":"Restocked");
  showToast(delta<0 ? `Issued 1 · Stock now ${it.currentStock}` : `Received 1 · Stock now ${it.currentStock}`);
  postAction(delta<0?"issueStock":"receiveStock", {id, qty:1, who:state.role, reason:delta<0?"Issued to patient care":"Restocked"});
  render();
}
function promptMove(id){
  if(!PERMS[state.role].move){ showToast("Your role can't move assets"); return; }
  const loc = prompt("Move to location:", getItem(id).location);
  if(!loc) return;
  const it = getItem(id);
  const from = it.location;
  movements.unshift({itemId:id, from, via:null, to:loc, date:today});
  logHistory(id, "Moved", `${from} → ${loc}`, loc);
  it.location = loc;
  showToast("Asset moved to "+loc);
  postAction("moveAsset", {id, to:loc, who:state.role});
  render();
}
function promptService(id){
  if(!PERMS[state.role].service){ showToast("Your role can't log service"); return; }
  const it = getItem(id);
  it.lastPM = today;
  it.nextPM = new Date(today.getFullYear()+1, today.getMonth(), today.getDate());
  it.status = "Working";
  logHistory(id, "Serviced / Calibrated", "Routine PM completed");
  showToast("Service logged — next PM "+fmt(it.nextPM));
  postAction("service", {id, who:state.role});
  render();
}
function promptRepair(id){
  if(!PERMS[state.role].repair){ showToast("Your role can't log repairs"); return; }
  const fault = prompt("Describe the fault:");
  if(!fault) return;
  const engineer = prompt("Assign engineer:","Schmidt")||"Unassigned";
  const it = getItem(id);
  it.status = "Repair";
  repairs.unshift({itemId:id, fault, reported:today, engineer, completed:null});
  logHistory(id, "Fault reported", fault);
  showToast("Fault logged, status set to Repair");
  postAction("repair", {id, fault, engineer, who:state.role});
  render();
}
const QTY_FIELD = {clean:"qtyClean", dirty:"qtyDirty", reprocessing:"qtyReprocessing"};
const QTY_LABEL = {clean:"Clean", dirty:"Dirty", reprocessing:"Reprocessing"};
function moveNonConsumableQty(id, from, to){
  if(!PERMS[state.role].reprocess){ showToast("Your role can't update reprocessing status"); return; }
  const it = getItem(id); if(!it) return;
  const fromField = QTY_FIELD[from], toField = QTY_FIELD[to];
  if(!fromField || !toField) return;
  if((it[fromField]||0) < 1) return;
  it[fromField] = (it[fromField]||0) - 1;
  it[toField] = (it[toField]||0) + 1;
  logHistory(id, "Reprocessing state", `${QTY_LABEL[from]} → ${QTY_LABEL[to]}`);
  showToast(`${it.name}: 1 unit moved ${QTY_LABEL[from]} → ${QTY_LABEL[to]}`);
  postAction("editItem", {
    id: it.id, sheet:"Equipment",
    qtyClean: it.qtyClean||0, qtyDirty: it.qtyDirty||0, qtyReprocessing: it.qtyReprocessing||0,
    lastModified: it.lastModified || "",
  });
  render();
}
function completeRepair(id){
  const r = repairs.find(r=>r.itemId===id && !r.completed);
  if(r) r.completed = today;
  const it = getItem(id);
  it.status = "Working";
  logHistory(id, "Repair completed", r?r.fault:"");
  showToast("Repair marked complete");
  postAction("completeRepair", {id, who:state.role});
  render();
}
/* ---------------- BIOMEDICAL MODULE (dedicated repair-tracking screen) ---------------- */
function estRepairCompletion(reported){
  const d = new Date(reported); d.setDate(d.getDate() + 5); // simple 5-day SLA estimate
  return d;
}
function renderBiomedical(){
  const open = repairs.filter(r=>!r.completed).sort((a,b)=>a.reported-b.reported);
  const completed = repairs.filter(r=>r.completed).sort((a,b)=>b.completed-a.completed).slice(0,10);
  const overdue = open.filter(r=>daysBetween(r.reported,today)>7).length;
  const completedThisMonth = repairs.filter(r=>r.completed && r.completed.getMonth()===today.getMonth() && r.completed.getFullYear()===today.getFullYear()).length;
  function statusFor(r){
    const daysOpen = daysBetween(r.reported, today);
    return daysOpen>7 ? {label:"Overdue", cls:"pill-low"} : {label:"In Progress", cls:"pill-loaned"};
  }
  return `
    <h2 class="section-title">🛠 Biomedical</h2>
    <div class="kpi-grid-4">
      <div class="kpi-cell"><div class="n" style="color:var(--red)">${open.length}</div><div class="l">Open</div></div>
      <div class="kpi-cell"><div class="n" style="color:var(--amber)">${overdue}</div><div class="l">Overdue &gt;7d</div></div>
      <div class="kpi-cell"><div class="n" style="color:var(--green)">${completedThisMonth}</div><div class="l">Fixed / mo</div></div>
      <div class="kpi-cell"><div class="n" style="color:var(--blue)">${repairs.length}</div><div class="l">All-Time</div></div>
    </div>

    <h3 class="sub-title">Open Repairs</h3>
    <div class="card desktop-table-wrap" style="padding:0; overflow-x:auto;">
      <table class="desktop-table">
        <thead><tr><th>Equipment</th><th>Problem</th><th>Reported</th><th>Engineer</th><th>Status</th><th>Est. Completion</th><th></th></tr></thead>
        <tbody>
          ${open.length ? open.map(r=>{
            const it = getItem(r.itemId);
            const st = statusFor(r);
            return `<tr onclick="openItem('${r.itemId}')">
              <td><div style="font-weight:700;">${it?it.name:r.itemId}</div><div style="font-size:10.5px; color:var(--muted);">${r.itemId}</div></td>
              <td>${r.fault}</td>
              <td>${fmt(r.reported)}</td>
              <td>${r.engineer||'Unassigned'}</td>
              <td><span class="pill ${st.cls}">${st.label}</span></td>
              <td>${fmt(estRepairCompletion(r.reported))}</td>
              <td style="text-align:right;">${PERMS[state.role].repair ? `<button class="btn btn-green" style="width:auto; padding:5px 10px; font-size:11px;" onclick="event.stopPropagation(); completeRepair('${r.itemId}')">✓ Complete</button>` : ''}</td>
            </tr>`;
          }).join('') : `<tr><td colspan="7" class="empty">No open repairs 🎉</td></tr>`}
        </tbody>
      </table>
    </div>
    <div class="card mobile-list">
      ${open.length ? open.map(r=>{

function scanSelect(id){

/* ---- Deep-link QR payloads: lets the iPhone's own native Camera/QR scanner open an item
   directly (far more reliable than any in-page camera decoder), by encoding this page's own
   URL + a ?scan= id instead of a bare ID. Falls back to a bare ID when not served over http(s)
   (e.g. a local file:// copy), since a file:// URL isn't meaningfully scannable cross-device. ---- */
function isDeepLinkActive(){
  return location.protocol === "http:" || location.protocol === "https:";
}
function scanLinkModeCaption(){
  return isDeepLinkActive()
    ? `<span style="color:var(--green);">🔗 Smart link active — your phone's Camera app can scan this and open straight to this item</span>`
    : `<span style="color:var(--amber);">📄 Plain ID only right now — open this app via its https:// link (e.g. your GitHub Pages URL) for scannable smart links. Opening the raw file directly won't produce one.</span>`;
}
function qrPayloadFor(id){
  if(location.protocol === "http:" || location.protocol === "https:"){
    try{
      const url = new URL(location.href);
      url.search = "?scan=" + encodeURIComponent(id);
      url.hash = "";
      return url.toString();
    }catch(e){ /* fall through to bare id */ }
  }
  return id;
}
function extractScanCode(raw){
  const str = String(raw).trim();
  if(/^https?:\/\//i.test(str)){
    try{
      const u = new URL(str);
      const v = u.searchParams.get("scan");
      if(v) return v;
    }catch(e){ /* not a URL we understand — treat as a bare code below */ }
  }
  return str;
}
function handleIncomingScanLink(){
  try{
    const params = new URLSearchParams(location.search);
    const raw = params.get("scan");
    if(!raw) return;
    window.history.replaceState(null, "", location.pathname + location.hash); // clean the URL so a refresh doesn't re-trigger
    const code = extractScanCode(raw);
    const match = getItem(code) || items.find(i=>i.name.toLowerCase()===code.toLowerCase()) || findDuplicate(code);
    if(!match){ showToast("Unrecognized code: " + code); return; }
    logHistory(match.id, "Scanned", "Opened via native camera/QR scan");
    postAction("scanLog", {id:match.id, who:state.role, location:match.location||match.storeLocation});
    openItem(match.id);
    showToast("Scanned: " + match.name);
  }catch(e){ console.warn("Incoming scan link handling failed:", e); }
}
let cameraStream = null;
let cameraRAF = null;
let barcodeFrameCounter = 0;
let scanHeartbeat = 0;
let barcodeReader = null;
let cropCanvas = null;
let nativeDetector = undefined; // undefined = not checked yet, false = unsupported
function getNativeDetector(){
  if(nativeDetector !== undefined) return nativeDetector;
  if(typeof BarcodeDetector === "undefined"){ nativeDetector = false; return false; }
  try{
    nativeDetector = new BarcodeDetector({ formats: ["qr_code","code_128","ean_13","ean_8","upc_a","upc_e","code_39"] });
  }catch(e){
    try{ nativeDetector = new BarcodeDetector({ formats: ["qr_code"] }); }
    catch(e2){ nativeDetector = false; }
  }
  return nativeDetector;
}
function bumpScanHeartbeat(){
  scanHeartbeat++;
  if(scanHeartbeat % 45 === 0){
    setStatus("Point the camera at a QR code… scanning" + ".".repeat((scanHeartbeat/45)%4));
  }
}
/* ---- Single shared "a code was found" path — every detection method (native BarcodeDetector,
   jsQR, ZXing) and every module (lookup, Quick Actions, Manage's scan-to-register, Audit trolley
   codes) funnels through here, so feedback and duplicate-guarding live in exactly one place. ---- */
let lastDetectedCode = null;
let lastDetectedTime = 0;
function playScanBeep(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    const ctx = new AC();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine"; o.frequency.value = 880;
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.13);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.14);
    o.onended = () => ctx.close().catch(()=>{});
  }catch(e){ /* audio isn't essential — never let it block scanning */ }
}
function flashScanFound(){
  const frame = document.getElementById('camFrame');
  if(!frame) return;
  frame.classList.add('found');
  setTimeout(() => frame.classList.remove('found'), 400);
}
function onCodeDetected(raw, beep, vibrate, highlight){
  const code = String(raw).trim();
  const now = Date.now();
  if(code === lastDetectedCode && (now - lastDetectedTime) < 1500) return; // ignore rapid duplicate reads
  lastDetectedCode = code; lastDetectedTime = now;
  if(vibrate !== false && navigator.vibrate){ try{ navigator.vibrate(80); }catch(e){} }
  if(beep !== false) playScanBeep();
  if(highlight !== false) flashScanFound();
  // A brief pause lets the checkmark/beep register before we act — feels instant, not abrupt.
  setTimeout(() => scanSelect(code), 150);
}
function getBarcodeReader(){
  if(barcodeReader || typeof ZXing === "undefined") return barcodeReader;
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E, ZXing.BarcodeFormat.CODE_39,
  ]);
  barcodeReader = new ZXing.MultiFormatReader();
  barcodeReader.setHints(hints);
  return barcodeReader;
}
function tryDecodeBarcode(canvas){
  const reader = getBarcodeReader();
  if(!reader) return null;
  try{
    const source = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
    const bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(source));
    const result = reader.decodeWithState(bitmap);
    return result ? result.getText() : null;
  }catch(e){
    return null; // NotFoundException etc. -- just means no barcode in this frame
  }
}
function startCameraScan(){
  if(cameraStream) return; // already running
  if(typeof jsQR === "undefined"){
    setStatus("QR decoder script didn't load. Try reloading the page.");
    return;
  }
  let inIframe = false;
  try{ inIframe = window.self !== window.top; }catch(e){ inIframe = true; }
  if(inIframe){
    setStatus("⚠ This preview is embedded in another page, and browsers block camera access inside embedded frames. Open this file directly in its own browser tab (not inside a preview/iframe) to use the camera, or use Search below for now.");
    return;
  }
  if(!window.isSecureContext){
    setStatus("⚠ Insecure page (" + location.protocol + "//" + location.host + "). Phones and browsers block the camera unless the page is served over https:// or http://localhost. A plain LAN IP like " + location.hostname + " over http:// does not count, even though it works on some desktop browsers. See the setup guide's \"Testing on a phone\" section for a quick https tunnel. Use Search below for now.");
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    setStatus("Camera API not available in this browser. Use the Search tab instead.");
    return;
  }
  setStatus("Requesting camera permission…");

  lastDetectedCode = null; lastDetectedTime = 0;
  navigator.mediaDevices.getUserMedia({ video: {
    facingMode: "environment",
    width: { ideal: 1280 }, height: { ideal: 720 },
  } })
    .then(stream => {
      cameraStream = stream;
      const video = document.getElementById('camVideo');
      if(!video){ stopCameraScan(); return; }
      video.srcObject = stream;
      video.play().catch(()=>{});
      setStatus("Point the camera at a QR code…");
      cameraRAF = requestAnimationFrame(scanFrame);
      const track = stream.getVideoTracks()[0];
      if(track && track.applyConstraints){
        // Continuous autofocus helps a lot with QR focus hunting — best effort, ignore if unsupported.
        track.applyConstraints({ advanced: [{ focusMode: "continuous" }] }).catch(()=>{});
      }
      setupTorchButton(track);
    })
    .catch(err => {
      setStatus("Camera blocked: " + err.name + " — " + err.message + ". Check your browser/site camera permission, or use Search below.");
    });
}
let torchTrack = null; let torchOn = false;
function setupTorchButton(track){
  torchTrack = null; torchOn = false;
  const btn = document.getElementById('torchBtn');
  if(!btn) return;
  const caps = track && track.getCapabilities ? track.getCapabilities() : {};
  if(caps && caps.torch){
    torchTrack = track;
    btn.style.display = "";
  } else {
    btn.style.display = "none";
  }

function toggleTorch(){
  if(!torchTrack) return;
  torchOn = !torchOn;

    showToast("This device doesn't support the flashlight toggle");
    torchOn = !torchOn;
  });

function stopCameraScan(){
  if(cameraRAF){ cancelAnimationFrame(cameraRAF); cameraRAF = null; }
  if(cameraStream){ cameraStream.getTracks().forEach(t=>t.stop()); cameraStream = null; }
  torchTrack = null; torchOn = false;
}
function setStatus(msg){
  const el = document.getElementById('camStatus');
  if(el) el.textContent = msg;
}
function scanFrame(){
  const video = document.getElementById('camVideo');
  const canvas = document.getElementById('camCanvas');
  if(!video || !canvas || state.modal!=="scan" || state.scanMode!=="camera"){ return; }
  if(video.readyState !== video.HAVE_ENOUGH_DATA || video.videoWidth === 0 || video.videoHeight === 0){
    cameraRAF = requestAnimationFrame(scanFrame);
    return;
  }

  const detector = getNativeDetector();
  if(detector){
    detector.detect(video).then(codes => {
      const hit = codes && codes.find(c => c.rawValue);
      if(hit){ onCodeDetected(hit.rawValue); return; }
      bumpScanHeartbeat();
      cameraRAF = requestAnimationFrame(scanFrame);
    }).catch(e => {
      // Native detector rejected (e.g. unsupported input on this browser) — disable it
      // for the rest of this session and drop to the jsQR/ZXing fallback from here on.
      console.warn("Native BarcodeDetector failed, falling back to jsQR:", e);
      nativeDetector = false;
      cameraRAF = requestAnimationFrame(scanFrame);
    });
    return;
  }

  try{
    const vw = video.videoWidth, vh = video.videoHeight;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    // Pass 1 — every single frame: the WHOLE frame, downscaled to a fixed working width.
    // This is what keeps scanning reliable regardless of exactly where the code sits in view —
    // downscaling keeps it cheap enough to run every frame without tanking the frame rate.
    // Resizing a canvas is itself costly, so only touch width/height when they actually change.
    const workW = Math.min(640, vw);
    const workH = Math.max(1, Math.round(vh * (workW / vw)));
    if(canvas.width !== workW || canvas.height !== workH){ canvas.width = workW; canvas.height = workH; }
    ctx.drawImage(video, 0, 0, workW, workH);
    let imgData = ctx.getImageData(0, 0, workW, workH);
    let code = jsQR(imgData.data, imgData.width, imgData.height);

    // Pass 2 — every 3rd frame only (it's pricier): full-resolution, zoomed into exactly the
    // area the green guide box covers on screen (measured live, so the box you see is truly
    // the area being scanned — not a mismatched guess). Catches small/far codes that pass 1's
    // downscale blurs away.
    if(!code && scanHeartbeat % 3 === 0){
      const frameEl = document.getElementById('camFrame');
      const videoRect = video.getBoundingClientRect();
      let cropFraction = 0.58; // fallback if measurement isn't available for some reason
      if(frameEl && videoRect.width > 0){
        const frameRect = frameEl.getBoundingClientRect();
        cropFraction = Math.min(0.95, Math.max(0.1, frameRect.width / videoRect.width));
      }
      const sw = Math.round(vw * cropFraction), sh = Math.round(vh * cropFraction);
      if(!cropCanvas) cropCanvas = document.createElement('canvas');
      if(cropCanvas.width !== sw || cropCanvas.height !== sh){ cropCanvas.width = sw; cropCanvas.height = sh; }
      const cctx = cropCanvas.getContext('2d', { willReadFrequently: true });
      cctx.drawImage(video, (vw - sw) / 2, (vh - sh) / 2, sw, sh, 0, 0, sw, sh);
      const cropData = cctx.getImageData(0, 0, sw, sh);
      code = jsQR(cropData.data, cropData.width, cropData.height);
    }

    if(code && code.data){
      onCodeDetected(code.data);
      return;
    }
    bumpScanHeartbeat();
    // Barcode decode is heavier, so only attempt it every few frames — reuse the working-res
    // frame already drawn above instead of redrawing, to keep the extra cost as low as possible.
    barcodeFrameCounter++;
    if(barcodeFrameCounter % 4 === 0){
      const barcodeText = tryDecodeBarcode(canvas);
      if(barcodeText){
        onCodeDetected(barcodeText);
        return;
      }
    }
  }catch(e){
    // A single bad frame (e.g. a transient getImageData hiccup) must never kill the scan loop.
    console.warn("Scan frame skipped:", e);
  }
  cameraRAF = requestAnimationFrame(scanFrame);
}

        return `<div class="audit-card ${r==='found'?'found':r==='missing'?'missing':r==='wrong'?'wrong':''}">

            <button class="found-btn" style="background:${r==='missing'?'var(--red)':'var(--red-light)'}; color:${r==='missing'?'#fff':'var(--red)'};" onclick="markAudit('${loc}','${i.id}','missing')">✕</button>
            <button class="found-btn" style="background:${r==='wrong'?'var(--purple)':'var(--purple-light)'}; color:${r==='wrong'?'#fff':'var(--purple)'}; font-size:10.5px;" onclick="promptWrongLocation('${loc}','${i.id}')">📍?</button>
          </div>
        </div>`;
      }).join('') || `<div class="empty">No trackable assets registered at this location.</div>`}
    </div>
    ${marked===assetsHere.length && assetsHere.length>0 ? `
      <div class="notif ${found===assetsHere.length?'cal':'low'}" style="margin-top:10px;">
        <span class="ic">${found===assetsHere.length?'✅':'⚠'}</span>
        <div><div class="t">Audit complete for ${loc}</div><div class="d">${assetsHere.length-found} item(s) missing</div></div>

}
function startAudit(loc){ state.auditLocation = loc; if(!auditState[loc]) auditState[loc]={}; render(); }
function markAudit(loc, itemId, val, actualLoc){
  auditState[loc][itemId] = val;
  if(val === 'wrong'){
    auditWrongLoc[loc] = auditWrongLoc[loc] || {};
    auditWrongLoc[loc][itemId] = actualLoc || "Unspecified";
  }
  const reasonText = val==='found' ? "Confirmed present" : val==='wrong' ? ("Wrong location — found at " + (actualLoc||'unspecified')) : "Marked missing";
  logHistory(itemId, "Audited", reasonText, loc);
  postAction("auditMark", {id:itemId, result:val, location: val==='wrong' ? actualLoc : loc, who:state.role});
  render();
}
function promptWrongLocation(loc, itemId){
  const actual = prompt("Where was this item actually found?");
  if(actual===null) return;
  markAudit(loc, itemId, 'wrong', actual || "Unspecified");
}

function downloadCsv(filename, headers, rows){
  const csvRows = [headers, ...rows];
  const csv = csvRows.map(r=>r.map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}
function exportCsv(kind){
  const def = REPORT_DEFS[kind];
  downloadCsv(kind + '_report.csv', def.cols, def.rows());
  showToast("CSV downloaded");
}
function exportFullInventory(){
  const headers = ["ID","Type","Category","Name","Status/Stock","Location","Manufacturer/Supplier","Model/Batch","Extra Date Info"];
  const rows = items.map(i=>{
    if(i.type==='consumable'){
      return [i.id, i.type, i.category, i.name, `${i.currentStock}/${i.maxStock} (min ${i.minStock})`, i.storeLocation, i.supplier, i.batchNumber, "Expires "+fmt(i.expiryDate)];
    }
    return [i.id, i.type, i.category, i.name, i.status, i.location, i.manufacturer, i.model, "Next PM "+fmt(i.nextPM)];
  });
  downloadCsv("nicu_full_inventory.csv", headers, rows);
  showToast("Full inventory CSV downloaded");
}
function exportHistoryCsv(){
  const headers = ["Item ID","Item Name","Action","Who","Date","Time","Location","Reason"];
  const rows = history.map(h=>[h.itemId, getItem(h.itemId)?getItem(h.itemId).name:h.itemId, h.action, h.who, fmt(h.date), h.time, h.location||"", h.reason||""]);
  downloadCsv("nicu_history_log.csv", headers, rows);
  showToast("History log CSV downloaded");
}
function exportFullBackup(){
  const payload = {
    exportedAt: new Date().toISOString(),
    items, history, movements, repairs,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "nicu_inventory_backup_" + todayStr() + ".json";
  a.click();
  showToast("Full JSON backup downloaded");
}

function openManage(){
  if(!PERMS[state.role].manage){ showToast("Your role can't manage the asset registry"); return; }
  state.modal = "manage"; state.manageTab = "add"; state.manageAddType = "equipment"; state.newAssetPhoto = null;
  state.addDraft = null;
  render();
}
/* Opening the scanner (or anything else that calls render()) rebuilds the whole DOM, so any
   Add-Item field the person already typed would otherwise vanish since those fields only ever
   lived in the DOM, not in `state`. Snapshot every field into state.addDraft first, and
   renderManageModal() below reads it back out so nothing already entered gets lost. */
const ADD_FORM_FIELD_IDS = [
  "f_category","f_unit","f_name",
  "f_manufacturer","f_model","f_serial","f_hospid","f_hospfileref","f_location","f_supplier","f_biocontact",
  "f_boxcount","f_unitsperbox","f_current","f_min","f_max","f_batch","f_expiry","f_storeloc",
];
function snapshotAddDraft(){
  const draft = {};
  ADD_FORM_FIELD_IDS.forEach(id=>{
    const el = document.getElementById(id);
    if(el) draft[id] = el.value;
  });
  state.addDraft = draft;
}
function draftVal(id, fallback){
  if(state.addDraft && Object.prototype.hasOwnProperty.call(state.addDraft, id) && state.addDraft[id] !== ""){
    return state.addDraft[id];
  }
  return fallback===undefined ? "" : fallback;
}
function onAddFieldInput(el){
  // Keeps state.addDraft continuously in sync with whatever's on screen, so ANY
  // action that forces a re-render mid-form (scanning, taking a photo, switching
  // category/type) restores what was already typed -- not just the scan button.
  if(!state.addDraft) state.addDraft = {};
  state.addDraft[el.id] = el.value;
}
function captureNewAssetPhoto(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){ state.newAssetPhoto = reader.result; render(); };
  reader.readAsDataURL(file);
}
function closeManage(){ state.modal = null; state.addDraft = null; render(); }
function setManageTab(t){ state.manageTab = t; render(); }
function setManageType(t){ state.manageAddType = t; render(); }

function openCategoryManager(type){

  state.categoryReturnTo = (state.modal === "manage") ? "manage" : null;
  state.modal = "categories";
  state.categoryType = type || state.manageAddType || "equipment";
  state.categoryEditing = null;

  state.modal = state.categoryReturnTo || null;

function setCategoryManagerType(t){ state.categoryType = t; state.categoryEditing = null; render(); }
function categoryUsageCount(type, name){
  return items.filter(i => i.type === type && i.category === name).length;
}
function addCategoryFromInput(){
  const type = state.categoryType;
  const input = document.getElementById('newCategoryInput');
  const name = (input ? input.value : "").trim();
  if(!name){ showToast("Enter a category name"); return; }
  const list = CATEGORY_OPTIONS[type];
  if(list.some(c => c.toLowerCase() === name.toLowerCase())){ showToast(`"${name}" already exists`); return; }
  // Keep "Other" as the last option, matching the existing convention across all three types.
  const otherIdx = list.findIndex(c => c.toLowerCase() === "other");
  if(otherIdx === -1) list.push(name); else list.splice(otherIdx, 0, name);
  saveCategoryOptions();
  postAction("addCategory", {type, name});
  showToast(`Added category "${name}"`);
  if(input) input.value = "";
  render();
}
function startRenameCategory(name){ state.categoryEditing = name; render(); }
function cancelRenameCategory(){ state.categoryEditing = null; render(); }
function submitRenameCategory(oldName){
  const type = state.categoryType;
  const input = document.getElementById('renameCategoryInput');
  const newName = (input ? input.value : "").trim();
  if(!newName){ showToast("Category name can't be empty"); return; }
  const list = CATEGORY_OPTIONS[type];
  if(newName.toLowerCase() !== oldName.toLowerCase() && list.some(c => c.toLowerCase() === newName.toLowerCase())){
    showToast(`"${newName}" already exists`); return;
  }
  const idx = list.findIndex(c => c === oldName);
  if(idx !== -1) list[idx] = newName;
  // Re-tag every existing item using the old category name so nothing becomes orphaned.
  let updated = 0;
  items.forEach(i => { if(i.type === type && i.category === oldName){ i.category = newName; updated++; } });
  saveCategoryOptions();
  postAction("renameCategory", {type, oldName, newName});
  state.categoryEditing = null;
  showToast(`Renamed to "${newName}"${updated ? ` — updated ${updated} item${updated===1?'':'s'}` : ''}`);
  render();
}
function deleteCategoryOption(name){
  const type = state.categoryType;
  const count = categoryUsageCount(type, name);
  if(count > 0){ showToast(`Can't delete "${name}" — ${count} item${count===1?'':'s'} still use it. Re-categorize them first.`); return; }
  if(name.toLowerCase() === "other"){ showToast(`Keep an "Other" category as a fallback bucket`); return; }
  if(!confirm(`Delete the "${name}" category? This can't be undone.`)) return;
  CATEGORY_OPTIONS[type] = CATEGORY_OPTIONS[type].filter(c => c !== name);
  saveCategoryOptions();
  postAction("deleteCategory", {type, name});
  showToast(`Deleted "${name}"`);
  render();
}
